<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Socratic Approach - Multi-Agent Debate</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
    :root {
        --background: #2a2119;
        --surface: #3a2f22;
        --text: #f1e9d9;
        --text-secondary: #b3a58c;
        --border: #6b5d4a;
        --warning: #f59e0b;
        --parchment: #f5e9d3;
        --parchment-ink: #44403c;
        --stone-light: #d9c9a3;
        --stone-mid: #a8946c;
        --stone-dark: #6b5a3e;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Press Start 2P', monospace;
        background-color: var(--background);
        color: var(--text);
        line-height: 1.6;
        min-height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    #game-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
    }

    #canvas-container {
        flex: 1;
        position: relative;
        min-height: 0;
        background: #1c1610;
    }

    /* Stage is sized by JS to a centered 16:9 box inside #canvas-container.
       The bubble layer shares its coordinate space with the canvas. */
    #stage {
        position: absolute;
    }

    #debate-canvas {
        display: block;
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
    }

    #bubble-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
    }

    .bubble {
        position: absolute;
        transform: translate(-50%, -100%) scale(1);
        max-width: 34%;
        min-width: 120px;
        padding: 10px;
        border: 2px solid;
        border-radius: 5px;
        font-size: 9px;
        line-height: 1.7;
        word-wrap: break-word;
        image-rendering: pixelated;
        transition: opacity 0.3s steps(4), transform 0.3s steps(4);
        opacity: 0;
    }

    .bubble.visible { opacity: 1; }
    .bubble.hiding  { opacity: 0; transform: translate(-50%, -60%) scale(0.4); }

    .bubble .speaker-name {
        display: block;
        font-size: 8px;
        margin-bottom: 6px;
        opacity: 0.9;
        text-transform: uppercase;
    }

    .bubble .tail {
        position: absolute;
        left: 50%;
        bottom: -10px;
        transform: translateX(-50%);
        width: 0;
        height: 0;
        border-left: 8px solid transparent;
        border-right: 8px solid transparent;
        border-top: 10px solid;
    }

    #status-scroll {
        position: absolute;
        left: 50%;
        bottom: 12px;
        transform: translateX(-50%);
        background: var(--parchment);
        color: var(--parchment-ink);
        border: 3px solid var(--stone-dark);
        border-left-width: 10px;
        border-right-width: 10px;
        border-radius: 3px;
        padding: 8px 14px;
        font-size: 9px;
        max-width: 80%;
        text-align: center;
        transition: opacity 0.4s steps(4);
        opacity: 0;
        pointer-events: none;
    }

    #status-scroll.visible { opacity: 0.95; }
    #status-scroll.error { color: #991b1b; }

    #input-section {
        background: var(--surface);
        border-top: 4px solid var(--stone-dark);
        padding: 12px 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: stretch;
    }

    .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        flex: 1;
        min-width: 160px;
    }

    .field.grow-2 { flex: 3; min-width: 240px; }

    .field label {
        font-size: 8px;
        color: var(--text-secondary);
        text-transform: uppercase;
    }

    .field input {
        font-family: 'Press Start 2P', monospace;
        font-size: 10px;
        color: var(--parchment-ink);
        background: var(--parchment);
        border: 3px solid var(--stone-mid);
        border-radius: 2px;
        padding: 9px 10px;
        outline: none;
        box-shadow: inset 2px 2px 0 rgba(107, 90, 62, 0.35);
        caret-color: var(--parchment-ink);
    }

    .field input:focus { border-color: var(--warning); }

    .buttons {
        display: flex;
        align-items: flex-end;
        gap: 10px;
    }

    button {
        font-family: 'Press Start 2P', monospace;
        font-size: 10px;
        color: #fff8ec;
        background: linear-gradient(180deg, var(--stone-light) 0%, var(--stone-mid) 55%, var(--stone-dark) 100%);
        border: 3px solid var(--stone-dark);
        border-radius: 3px;
        padding: 12px 16px;
        cursor: pointer;
        text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.6);
        box-shadow: 0 4px 0 #241c12;
    }

    button:hover:not(:disabled) {
        background: linear-gradient(180deg, #e8dcc0 0%, var(--stone-light) 55%, var(--stone-mid) 100%);
    }

    button:active:not(:disabled) {
        transform: translateY(3px);
        box-shadow: 0 1px 0 #241c12;
    }

    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #stop-btn { display: none; }
</style>
</head>
<body>
<div id="game-container">
    <div id="canvas-container">
        <div id="stage">
            <canvas id="debate-canvas" width="960" height="540"></canvas>
            <div id="bubble-layer"></div>
            <div id="status-scroll"></div>
        </div>
    </div>
    <div id="input-section">
        <div class="field grow-2">
            <label for="topic-input">Question / Idea / Belief</label>
            <input id="topic-input" type="text" maxlength="300"
                   placeholder="e.g. Is honesty always the best policy?">
        </div>
        <div class="field">
            <label for="key-input">OpenRouter API Key</label>
            <input id="key-input" type="password" placeholder="sk-or-..." autocomplete="off">
        </div>
        <div class="field">
            <label for="model-input">Model</label>
            <input id="model-input" type="text" spellcheck="false">
        </div>
        <div class="buttons">
            <button id="start-btn">Begin Debate</button>
            <button id="stop-btn">Stop</button>
        </div>
    </div>
</div>

<script>
'use strict';

/* ============================================================
 * Configuration
 * ============================================================ */
const DEFAULT_MODEL = 'meta-llama/llama-3.3-70b-instruct:free';
const MAX_TURNS = 3;          // debate rounds before the Judge must rule
const API_DELAY_MS = 1200;    // pause between calls (free-tier rate limits)
const TYPE_SPEED_MS = 22;     // typing effect, per character
const BUBBLE_LINGER_MS = 1000;

const SCENE_W = 960, SCENE_H = 540; // logical scene resolution
const BG_W = 480, BG_H = 270;       // low-res background pixel grid (2x upscale)

// Foreground (back-view) characters: sprite grid 36x56, anchored below the
// bottom edge so their lower bodies are cropped by the frame.
const BACK_U = 8, BACK_GRID_H = 56, BACK_BOTTOM = 612;
const FACING_GRID_H = 62;

/* ============================================================
 * Personas
 * ============================================================ */
const STYLE_RULES = 'Stay strictly in character. Reply in 2-4 short sentences of plain ' +
    'spoken prose: no markdown, no lists, no stage directions, no quotation of your own name.';

const PERSONAS = [
    {
        id: 'grump', name: 'Grump', color: '#78716c', textColor: '#ffffff',
        system: 'You are the Grump, the closed-minded critic in a debate among six ancient ' +
            'Greek philosophers. Be cynical, dismissive and resistant to new ideas: voice ' +
            'doubts, grumble about impracticality, and puncture enthusiasm. ' + STYLE_RULES,
        pose: 'back', x: 140, u: BACK_U,
        sprite: { skin: '#d9b48a', attire: '#8a8378', shade: '#6e675c', light: '#a29a8c',
                  hair: '#9a938a', messy: true, slouch: true }
    },
    {
        id: 'contrarian', name: 'Contrarian', color: '#ef4444', textColor: '#ffffff',
        system: 'You are the Contrarian, the devil\'s advocate in a debate among six ancient ' +
            'Greek philosophers. Whatever position currently dominates the discussion, argue ' +
            'the opposite, sharply but honestly, to test the strength of the idea. ' + STYLE_RULES,
        pose: 'facing', x: 300, by: 445, u: 4,
        sprite: { skin: '#c98850', attire: '#b5443f', light: '#c85a50', shade: '#8e332f',
                  trim: '#d9a441', hair: { color: '#3a2a1e', style: 'short' },
                  crossedArms: true, brow: 'frown' }
    },
    {
        id: 'socrates', name: 'Socrates', color: '#2563eb', textColor: '#ffffff',
        system: 'You are Socrates, the probing questioner in a debate among six ancient Greek ' +
            'philosophers. Use the Socratic method: never state your own opinion. Ask short, ' +
            'pointed questions that expose hidden assumptions and contradictions in the topic ' +
            'or in what the others have said. ' + STYLE_RULES,
        pose: 'facing', x: 435, by: 428, u: 4,
        sprite: { skin: '#e3bd93', attire: '#f0e8d8', light: '#faf5ea', shade: '#cfc2a8',
                  drape: '#3b6ea5', bald: true, beard: '#e8e2d4', staff: true, brow: 'calm' }
    },
    {
        id: 'freethinker', name: 'Free Thinker', color: '#8b5cf6', textColor: '#ffffff',
        system: 'You are the Free Thinker, the open-minded explorer in a debate among six ' +
            'ancient Greek philosophers. Be creative and speculative: expand the space of ' +
            'possibilities, question constraints, and offer unconventional angles no one else ' +
            'has considered. ' + STYLE_RULES,
        pose: 'facing', x: 570, by: 432, u: 4,
        sprite: { skin: '#8a5a36', attire: '#7d5fa8', light: '#937bc0', shade: '#5f4585',
                  hair: { color: '#45306b', style: 'wild' }, brow: 'calm' }
    },
    {
        id: 'judge', name: 'Judge', color: '#f59e0b', textColor: '#3b2205',
        system: 'You are the Judge, the arbitrator in a debate among six ancient Greek ' +
            'philosophers. Be fair and decisive: weigh the arguments made so far, name the ' +
            'strongest points on each side, and guide the group toward consensus. ' + STYLE_RULES,
        pose: 'facing', x: 705, by: 448, u: 4,
        sprite: { skin: '#d9a066', attire: '#cf8a2e', light: '#e0a044', shade: '#a06a1e',
                  trim: '#f5efe0', hair: { color: '#4a4440', style: 'short' }, brow: 'stern' }
    },
    {
        id: 'synthesizer', name: 'Synthesizer', color: '#10b981', textColor: '#062e24',
        system: 'You are the Synthesizer, the integrator in a debate among six ancient Greek ' +
            'philosophers. Be balanced and analytical: identify common ground between the ' +
            'speakers, reconcile opposing views, and restate the emerging shared position. ' +
            STYLE_RULES,
        pose: 'back', x: 830, u: BACK_U,
        sprite: { skin: '#c98850', attire: '#5f8760', shade: '#47684a', light: '#78a078',
                  wrap: '#8fae8a', hair: '#2e2a26' }
    }
];

// Speech bubble anchor: above the head for facing characters; at the head of
// the large cropped foreground characters for back-view ones.
for (const p of PERSONAS) {
    p.bubble = p.pose === 'back'
        ? { x: p.x, y: BACK_BOTTOM - BACK_GRID_H * p.u + 16 }
        : { x: p.x, y: p.by - FACING_GRID_H * p.u - 10 };
}

/* ============================================================
 * Stage layout (letterboxed 16:9 canvas + overlay)
 * ============================================================ */
const stage = document.getElementById('stage');
const canvas = document.getElementById('debate-canvas');
const ctx = canvas.getContext('2d');
const bubbleLayer = document.getElementById('bubble-layer');
const statusEl = document.getElementById('status-scroll');

function layoutStage() {
    const box = document.getElementById('canvas-container').getBoundingClientRect();
    const scale = Math.min(box.width / SCENE_W, box.height / SCENE_H);
    const w = Math.floor(SCENE_W * scale), h = Math.floor(SCENE_H * scale);
    stage.style.width = w + 'px';
    stage.style.height = h + 'px';
    stage.style.left = Math.floor((box.width - w) / 2) + 'px';
    stage.style.top = Math.floor((box.height - h) / 2) + 'px';
}
window.addEventListener('resize', layoutStage);
layoutStage();

/* ============================================================
 * Background painting (once, to an offscreen low-res buffer)
 * Warm Mediterranean daylight: cream marble, sand stone, azure sea.
 * ============================================================ */
function mulberry32(seed) {
    return function () {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}

const HORIZON = 84;                 // sea horizon row in the BG grid
const WALL_TOP = 98, FLOOR = 122;   // stone parapet behind the circle

function paintBackground() {
    const bg = document.createElement('canvas');
    bg.width = BG_W; bg.height = BG_H;
    const b = bg.getContext('2d');
    const rand = mulberry32(20260703);
    const px = (x, y, w, h, c) => { b.fillStyle = c; b.fillRect(x, y, w, h); };

    // --- Sky (warm azure bands) ---
    px(0, 0, BG_W, 30, '#5ba3d0');
    px(0, 30, BG_W, 28, '#7fb9de');
    px(0, 58, BG_W, HORIZON - 58, '#a9d2ea');
    for (let i = 0; i < 8; i++) {                                   // cream clouds
        const cx = Math.floor(rand() * BG_W), cy = 6 + Math.floor(rand() * 40);
        const cw = 16 + Math.floor(rand() * 26);
        px(cx, cy, cw, 4, '#f6f1e4');
        px(cx + 4, cy - 3, cw - 8, 3, '#fffdf6');
        px(cx - 3, cy + 4, cw - 4, 3, '#eee7d4');
    }

    // --- Sea ---
    px(0, HORIZON, BG_W, 4, '#2f6f9e');
    px(0, HORIZON + 4, BG_W, 5, '#3f86b8');
    px(0, HORIZON + 9, BG_W, WALL_TOP - HORIZON - 9, '#57a0cc');
    for (let i = 0; i < 70; i++)
        px(Math.floor(rand() * BG_W), HORIZON + 1 + Math.floor(rand() * 12),
           2 + Math.floor(rand() * 3), 1, rand() > 0.5 ? '#8ec4e0' : '#6db3d6');
    for (const [ix, iw] of [[40, 20], [126, 12], [214, 16]])        // hazy islands
        { px(ix, HORIZON - 3, iw, 3, '#8b96a0'); px(ix + 3, HORIZON - 4, iw - 6, 1, '#7d8a94'); }

    // --- Acropolis headland (right), rising out of the sea ---
    for (let x = 296; x < BG_W; x++) {
        const top = Math.round(HORIZON - (x - 296) * 38 / 184);
        px(x, top, 1, WALL_TOP - top, '#a08a5f');
        if (x % 7 === 0) px(x, top + 2, 2, 2, '#8f7a50');           // scrub texture
        if (x % 11 === 3) px(x, top + 6, 3, 2, '#7a9a5a');          // olive groves
    }
    for (let x = 340; x < BG_W; x++)                                 // rocky cliff band
        px(x, Math.round(HORIZON - (x - 296) * 38 / 184), 1, 3, '#c9b184');
    // Temple on the hilltop
    px(364, 56, 92, 3, '#d9cbb0');                                   // stylobate
    for (let i = 0; i < 8; i++) {
        px(368 + i * 11, 42, 5, 14, '#ede4d0');
        px(371 + i * 11, 42, 2, 14, '#c9b184');                      // column shading
    }
    px(364, 39, 92, 3, '#e6d9bd');                                   // architrave
    px(374, 36, 72, 3, '#efe5cf');                                    // pediment steps
    px(388, 33, 44, 3, '#efe5cf');
    px(404, 30, 12, 3, '#f5eddb');
    for (const cx of [318, 348, 462]) {                               // cypresses
        px(cx, 62, 3, 16, '#2f4f34');
        px(cx + 1, 58, 1, 5, '#2f4f34');
    }
    // Hazy coastline sliver on the left
    px(0, 78, 90, 6, '#93a878');
    px(0, 76, 52, 3, '#a3b585');

    // --- Stone parapet behind the circle ---
    px(0, WALL_TOP, BG_W, 4, '#e8dcc0');                              // coping
    px(0, WALL_TOP + 4, BG_W, 1, '#b8a67f');
    px(0, WALL_TOP + 5, BG_W, FLOOR - WALL_TOP - 5, '#d9c9a3');
    for (let x = 0; x < BG_W; x += 26)                                 // block joints
        px(x + (Math.floor(x / 26) % 2) * 13, WALL_TOP + 5, 1, FLOOR - WALL_TOP - 5, '#c4b28a');
    px(0, WALL_TOP + 13, BG_W, 1, '#c4b28a');
    for (let i = 0; i < 40; i++)                                        // weathering
        px(Math.floor(rand() * BG_W), WALL_TOP + 6 + Math.floor(rand() * 15), 2, 1, '#cbb790');

    // Potted olive tree standing on the parapet (right of the circle)
    px(310, 68, 26, 22, '#6f8f6a');                                    // foliage mass
    px(306, 74, 8, 8, '#57705a'); px(332, 72, 6, 8, '#57705a');
    px(314, 64, 14, 6, '#8aa886'); px(322, 84, 10, 6, '#8aa886');
    px(321, 88, 3, 10, '#7c5a3a');                                     // trunk
    px(314, 96, 18, 3, '#c47a4a');                                     // pot rim
    px(316, 99, 14, 10, '#b0663a');
    px(317, 99, 3, 9, '#cc8352'); px(327, 100, 2, 8, '#8a4a28');

    // --- Sand-stone floor ---
    px(0, FLOOR, BG_W, BG_H - FLOOR, '#d9c9a3');
    px(0, FLOOR, BG_W, 3, '#c4b28a');                                  // shadow at the wall
    const rows = [128, 138, 150, 164, 180, 198, 218, 240, 264];        // perspective joints
    for (const y of rows) px(0, y, BG_W, 1, '#b8a67f');
    for (let i = 0; i < rows.length - 1; i++) {
        const span = 34 + i * 8;                                        // tiles widen nearer
        for (let x = (i % 2) * (span >> 1); x < BG_W; x += span)
            px(x, rows[i] + 1, 1, rows[i + 1] - rows[i] - 1, '#c4b28a');
    }
    for (let i = 0; i < 120; i++) {                                     // worn tesserae
        const t = rand();
        px(Math.floor(rand() * BG_W), FLOOR + 3 + Math.floor(rand() * (BG_H - FLOOR - 4)),
           2, 1, t > 0.66 ? '#e8dcc0' : t > 0.33 ? '#c4b28a' : '#cbb790');
    }
    // Central mosaic medallion (between the two foreground debaters)
    for (let y = 208; y < BG_H; y++)
        for (let x = 200; x < 280; x++) {
            const d = Math.hypot(x - 240, (y - 244) * 1.6);             // squashed by perspective
            if (d >= 36) continue;
            const c = d < 9 ? '#e8dcc0' : d < 15 ? '#6d98b4' : d < 21 ? '#e8dcc0'
                    : d < 27 ? '#6d98b4' : d < 32 ? '#cbb790' : '#b8a67f';
            if ((x + y) % 5 !== 0) px(x, y, 1, 1, c);                    // tessera gaps
        }
    // Amphora resting on the floor
    px(147, 238, 6, 5, '#b0663a'); px(145, 237, 10, 2, '#8a4a28');       // neck & lip
    px(141, 243, 18, 3, '#b0663a');                                       // shoulders
    px(139, 246, 22, 10, '#b0663a');                                      // body
    px(141, 256, 18, 4, '#b0663a'); px(144, 260, 12, 3, '#a05a30');
    px(146, 263, 8, 2, '#8a4a28'); px(143, 265, 14, 2, '#7a4020');        // foot
    px(141, 247, 4, 9, '#cc8352'); px(155, 247, 4, 9, '#8a4a28');          // shading
    px(139, 251, 22, 2, '#5f3420');                                        // painted band
    px(137, 243, 3, 8, '#8a4a28'); px(160, 243, 3, 8, '#8a4a28');           // handles
    return bg;
}

// Foreground: cream marble columns framing the scene (drawn over characters)
function paintForeground() {
    const fg = document.createElement('canvas');
    fg.width = BG_W; fg.height = BG_H;
    const f = fg.getContext('2d');
    const px = (x, y, w, h, c) => { f.fillStyle = c; f.fillRect(x, y, w, h); };
    for (const [base, flip] of [[0, false], [BG_W - 26, true]]) {
        px(base, 0, 26, BG_H, '#ede4d0');                                   // shaft
        px(flip ? base : base + 22, 0, 4, BG_H, '#f7f0dd');                 // lit edge
        px(flip ? base + 23 : base, 0, 3, BG_H, '#c9b184');                 // shaded edge
        for (let i = 1; i < 6; i++)                                          // fluting
            px(base + 2 + i * 4, 12, 1, BG_H - 12, flip ? '#d5c5a5' : '#dccfae');
        px(base - (flip ? 4 : 0), 0, 30, 8, '#e6d9bd');                     // capital
        px(base - (flip ? 4 : 0), 8, 30, 3, '#c9b184');
        px(base - (flip ? 4 : 0), BG_H - 14, 30, 14, '#e0d3b4');             // base slab
        px(base - (flip ? 4 : 0), BG_H - 14, 30, 2, '#c9b184');
    }
    return fg;
}

const bgCanvas = paintBackground();
const fgCanvas = paintForeground();

/* ============================================================
 * Characters
 * Facing characters: seated, 40x62 pixel grid, realistic proportions.
 * Back-view characters: 36x56 grid, large, cropped at the frame edge.
 * ============================================================ */
const chars = PERSONAS.map(p => ({
    p,
    state: 'idle',            // idle | speaking | listening
    phase: Math.random() * Math.PI * 2,
    nextBlink: performance.now() + 1500 + Math.random() * 3000,
    blinkUntil: 0,
    nextNod: performance.now() + 3000 + Math.random() * 5000,
    nodUntil: 0
}));

function shadeOf(hex) {
    const n = parseInt(hex.slice(1), 16);
    const r = Math.max(0, (n >> 16) - 40), g = Math.max(0, (n >> 8 & 255) - 40), bl = Math.max(0, (n & 255) - 40);
    return `rgb(${r},${g},${bl})`;
}

function lightOf(hex) {
    const n = parseInt(hex.slice(1), 16);
    const r = Math.min(255, (n >> 16) + 28), g = Math.min(255, (n >> 8 & 255) + 28), bl = Math.min(255, (n & 255) + 28);
    return `rgb(${r},${g},${bl})`;
}

function animState(c, now) {
    const t = now / 1000;
    if (now >= c.nextBlink) { c.blinkUntil = now + 130; c.nextBlink = now + 1800 + Math.random() * 3500; }
    let nod = 0;
    if (c.state === 'speaking') {
        nod = Math.sin(t * 5.5 + c.phase) > 0.55 ? 1 : 0;
    } else if (c.state === 'listening') {
        if (now >= c.nextNod) { c.nodUntil = now + 550; c.nextNod = now + 2500 + Math.random() * 5000; }
        if (now < c.nodUntil) nod = Math.floor((now - (c.nodUntil - 550)) / 140) % 2;
    }
    return {
        t,
        bob: Math.sin(t * 1.7 + c.phase) > 0 ? 0 : -1,                 // breathing
        blink: now < c.blinkUntil,
        nod,
        turn: c.state !== 'speaking' ? Math.round(Math.sin(t * 0.35 + c.phase * 2) * 0.8) : 0,
        gesture: c.state === 'speaking' ? Math.floor(t * 2.2) % 3 : -1,
        mouthFrame: c.state === 'speaking' ? Math.floor(now / 130) % 3 : -1
    };
}

/* ---------- Seated, facing the viewer ---------- */
function drawFacingChar(c, now) {
    const s = c.p.sprite, u = c.p.u;
    const a = animState(c, now);
    const X = c.p.x - 20 * u, Y = c.p.by - FACING_GRID_H * u + a.bob * u;
    const px = (col, row, w, h, color) => {
        ctx.fillStyle = color;
        ctx.fillRect(Math.round(X + col * u), Math.round(Y + row * u), Math.ceil(w * u), Math.ceil(h * u));
    };
    const skinShade = shadeOf(s.skin);

    // Ground shadow
    ctx.fillStyle = 'rgba(120, 96, 60, 0.35)';
    ctx.beginPath();
    ctx.ellipse(c.p.x, c.p.by - u, 16 * u, 3 * u, 0, 0, Math.PI * 2);
    ctx.fill();

    // Marble bench (ends visible either side of the seated figure)
    px(0, 34, 40, 3, '#f2ead6');
    px(0, 37, 40, 1, '#98815c');
    px(0, 38, 40, 15, '#c2ae83');
    px(1, 39, 2, 13, '#d5c39a'); px(36, 39, 3, 14, '#a8946c');
    px(0, 53, 40, 3, '#8d7854');

    // Staff leaning against the bench (Socrates)
    if (s.staff) { px(36, 6, 2, 55, '#8b5a2b'); px(35, 4, 4, 3, '#6b4423'); }

    // Shins & feet (robe hem drawn over the top of the shins)
    px(12, 48, 4, 11, s.skin); px(15, 48, 1, 11, skinShade);
    px(24, 48, 4, 11, s.skin); px(27, 48, 1, 11, skinShade);
    px(10, 58, 7, 3, s.skin); px(23, 58, 7, 3, s.skin);
    px(9, 60, 9, 2, '#7c5a3a'); px(22, 60, 9, 2, '#7c5a3a');           // sandal soles
    px(11, 58, 4, 1, '#5d4227'); px(24, 58, 4, 1, '#5d4227');          // straps
    px(13, 53, 2, 1, '#5d4227'); px(25, 53, 2, 1, '#5d4227');          // shin laces

    // Lap and robe over the knees
    px(8, 31, 24, 8, s.light);
    px(18, 33, 4, 6, s.shade);                                          // fold between knees
    px(9, 39, 22, 11, s.attire);                                        // hanging hem
    px(13, 40, 1, 9, s.shade); px(22, 40, 1, 9, s.shade); px(26, 40, 1, 8, s.shade);
    if (s.trim) px(9, 49, 22, 1, s.trim);
    px(9, 50, 22, 1, s.shade);

    // Torso
    px(10, 15, 20, 8, s.attire);
    px(11, 23, 18, 8, s.attire);
    px(10, 15, 2, 8, s.shade); px(11, 23, 2, 8, s.shade);
    px(20, 17, 1, 13, s.shade);
    px(8, 15, 4, 4, s.attire); px(28, 15, 4, 4, s.attire);              // shoulder caps
    px(17, 15, 6, 1, s.skin); px(18, 16, 4, 1, s.skin); px(19, 17, 2, 1, s.skin); // chest V
    if (s.trim) px(15, 14, 10, 1, s.trim);
    px(11, 23, 18, 1, shadeOf(s.shade));                                 // belt line
    if (s.drape) {                                                        // himation drape
        for (let i = 0; i < 15; i++) px(25 - i, 15 + i, 5, 1, s.drape);
        px(28, 15, 4, 4, s.drape);                                        // over the shoulder
        px(8, 31, 9, 2, s.drape);                                          // falling onto the lap
    }

    // Arms
    if (a.gesture === 1) {
        // Both hands raised, palms open (mid-argument, like the reference)
        px(7, 16, 3, 6, s.attire); px(30, 16, 3, 6, s.attire);
        px(5, 12, 3, 8, s.skin); px(32, 12, 3, 8, s.skin);
        px(4, 9, 4, 4, s.skin); px(32, 9, 4, 4, s.skin);
    } else if (a.gesture === 2) {
        // Right hand raised, pointing; left resting
        px(8, 16, 3, 7, s.attire); px(9, 23, 3, 4, s.skin);
        px(11, 27, 3, 4, s.skin); px(13, 30, 4, 3, s.skin);
        px(30, 16, 3, 5, s.attire);
        px(32, 13, 3, 7, s.skin); px(33, 10, 3, 3, s.skin); px(34, 8, 1, 3, s.skin);
    } else if (s.crossedArms) {
        px(9, 24, 22, 4, s.attire);
        px(9, 24, 22, 1, s.light);
        px(9, 25, 3, 2, s.skin); px(28, 25, 3, 2, s.skin);               // tucked hands
    } else {
        // Hands resting on the lap
        px(8, 16, 3, 7, s.attire); px(29, 16, 3, 7, s.attire);
        px(9, 23, 3, 4, s.skin); px(28, 23, 3, 4, s.skin);
        px(11, 27, 3, 4, s.skin); px(26, 27, 3, 4, s.skin);
        px(13, 30, 4, 3, s.skin); px(23, 30, 4, 3, s.skin);
    }

    // Neck & head
    const hy = a.nod, tn = a.turn;
    px(18, 12 + hy, 4, 3, s.skin);
    px(15 + tn, 2 + hy, 10, 11, s.skin);
    px(15 + tn, 2 + hy, 1, 11, skinShade);
    px(16 + tn, 12 + hy, 8, 1, skinShade);                                // jaw shade

    // Hair
    if (s.bald) {
        px(15 + tn, 2 + hy, 10, 1, '#f2d8b5');                            // shining pate
        px(14 + tn, 5 + hy, 1, 5, s.beard); px(25 + tn, 5 + hy, 1, 5, s.beard);
    } else if (s.hair.style === 'wild') {
        const hc = s.hair.color;
        px(13 + tn, 0 + hy, 14, 4, hc);
        px(11 + tn, 1 + hy, 3, 3, hc); px(17 + tn, -1 + hy, 3, 2, hc);
        px(22 + tn, 0 + hy, 4, 2, hc); px(26 + tn, 2 + hy, 2, 3, hc);
        px(14 + tn, 3 + hy, 2, 6, hc); px(24 + tn, 3 + hy, 2, 6, hc);      // wild sideburns
    } else {
        const hc = s.hair.color;
        px(14 + tn, 0 + hy, 12, 4, hc);
        px(14 + tn, 3 + hy, 2, 4, hc); px(24 + tn, 3 + hy, 2, 4, hc);
    }

    // Beard (over jaw and neck)
    if (s.beard) {
        px(14 + tn, 9 + hy, 12, 3, s.beard);
        px(15 + tn, 12 + hy, 10, 3, s.beard);
        px(16 + tn, 15 + hy, 8, 1, s.beard);
        px(18 + tn, 10 + hy, 4, 1, s.skin);                                // clear the mouth
    }

    // Brows
    const browColor = s.beard ? '#cfc8b8' : (s.hair ? s.hair.color : '#3a2a1e');
    if (s.brow === 'frown') {
        px(16 + tn, 4 + hy, 3, 1, browColor); px(21 + tn, 4 + hy, 3, 1, browColor);
        px(18 + tn, 5 + hy, 1, 1, browColor); px(21 + tn, 5 + hy, 1, 1, browColor);
    } else if (s.brow === 'stern') {
        px(16 + tn, 5 + hy, 4, 1, browColor); px(20 + tn, 5 + hy, 4, 1, browColor);
    } else {
        px(16 + tn, 5 + hy, 3, 1, browColor); px(21 + tn, 5 + hy, 3, 1, browColor);
    }

    // Eyes & nose
    if (a.blink) {
        px(16 + tn, 7 + hy, 2, 1, skinShade); px(21 + tn, 7 + hy, 2, 1, skinShade);
    } else {
        px(16 + tn, 6 + hy, 2, 2, '#f7f3ea'); px(21 + tn, 6 + hy, 2, 2, '#f7f3ea');
        const pd = tn > 0 ? 1 : 0;
        px(16 + tn + pd, 7 + hy, 1, 1, '#2b1d12'); px(21 + tn + pd, 7 + hy, 1, 1, '#2b1d12');
    }
    px(19 + tn, 7 + hy, 1, 3, skinShade);                                  // nose

    // Mouth (2-3 frame speech animation)
    const mc = '#7f4436';
    if (a.mouthFrame === 0) px(18 + tn, 10 + hy, 4, 1, mc);
    else if (a.mouthFrame === 1) px(18 + tn, 10 + hy, 4, 2, '#57302a');
    else if (a.mouthFrame === 2) { px(19 + tn, 10 + hy, 2, 2, '#57302a'); px(18 + tn, 10 + hy, 4, 1, mc); }
    else if (s.frownMouth) { px(18 + tn, 11 + hy, 4, 1, mc); px(17 + tn, 10 + hy, 1, 1, mc); px(22 + tn, 10 + hy, 1, 1, mc); }
    else if (s.smile) { px(18 + tn, 10 + hy, 4, 1, mc); px(17 + tn, 9 + hy, 1, 1, mc); px(22 + tn, 9 + hy, 1, 1, mc); }
    else px(18 + tn, 10 + hy, 4, 1, mc);
}

/* ---------- Foreground, seen from behind ---------- */
function drawBackChar(c, now) {
    const s = c.p.sprite, u = c.p.u;
    const a = animState(c, now);
    const bobPx = a.bob * 4;                                              // gentler at this scale
    const X = c.p.x - 18 * u, Y = BACK_BOTTOM - BACK_GRID_H * u;
    const px = (col, row, w, h, color, yPx = 0) => {
        ctx.fillStyle = color;
        ctx.fillRect(Math.round(X + col * u), Math.round(Y + row * u + yPx), Math.ceil(w * u), Math.ceil(h * u));
    };

    // Back and shoulders
    px(6, 16, 24, 3, s.attire, bobPx);
    px(3, 19, 30, 37, s.attire);
    px(17, 22, 2, 34, s.shade);                                            // spine fold
    px(9, 26, 1, 30, s.shade); px(26, 24, 1, 32, s.shade);
    px(4, 19, 2, 37, s.light);                                             // rim light
    px(30, 19, 2, 37, s.shade);
    if (s.wrap) for (let i = 0; i < 13; i++) px(6 + i, 20 + i, 6, 1, s.wrap); // himation band
    if (s.slouch) { px(8, 19, 20, 2, s.light); }                           // hunched shoulder roll

    // Arms at the sides (cropped by the frame)
    px(0, 20, 4, 12, s.attire); px(32, 20, 4, 12, s.attire);
    px(0, 32, 4, 14, s.skin); px(32, 32, 4, 14, s.skin);

    // Speaking: raised gesturing hand beside the shoulder
    if (c.state === 'speaking') {
        const up = Math.floor(a.t * 2.2) % 2;
        px(33, up ? 12 : 15, 4, 5, s.skin, bobPx);
    }

    // Head (back of the head is mostly hair) — slouch sinks it into the shoulders
    const hPx = (s.slouch ? 3 * u : 0) + a.nod * 4 + bobPx;
    px(14, 12, 8, 6, s.skin, hPx);                                          // neck
    px(13, 1, 10, 2, s.hair, hPx);                                          // crown
    px(12, 3, 12, 8, s.hair, hPx);
    px(13, 11, 10, 3, s.hair, hPx);                                         // nape taper
    px(13, 3, 1, 7, lightOf(s.hair), hPx);                                  // sheen strands
    px(19, 2, 1, 9, lightOf(s.hair), hPx);
    if (s.messy) {
        px(10, 4, 2, 2, s.hair, hPx); px(24, 3, 2, 2, s.hair, hPx);
        px(23, 7, 2, 1, s.hair, hPx); px(15, 0, 3, 1, s.hair, hPx);
    }
    px(11, 7, 1, 3, s.skin, hPx); px(24, 7, 1, 3, s.skin, hPx);              // ears

    // Speaking: head turns to profile so the cheek and moving jaw show
    if (c.state === 'speaking') {
        px(25, 5, 3, 6, s.skin, hPx);                                        // cheek
        px(27, 7, 2, 2, s.skin, hPx);                                        // nose
        px(26, 4, 2, 1, s.hair, hPx);                                        // brow edge
        if (a.mouthFrame === 1) px(26, 10, 2, 1, '#57302a', hPx);            // jaw opens
    }
}

/* ============================================================
 * Render loop
 * ============================================================ */
ctx.imageSmoothingEnabled = false;

function render(now) {
    const t = now / 1000;
    ctx.clearRect(0, 0, SCENE_W, SCENE_H);

    // Subtle camera sway (background drawn with 8px overscan)
    const camX = Math.sin(t * 0.13) * 3, camY = Math.cos(t * 0.09) * 2;
    ctx.drawImage(bgCanvas, -8 + camX, -8 + camY, SCENE_W + 16, SCENE_H + 16);

    // Facing characters, farthest first; then the two foreground backs
    const facing = chars.filter(c => c.p.pose === 'facing').sort((a, b) => a.p.by - b.p.by);
    for (const c of facing) drawFacingChar(c, now);
    for (const c of chars) if (c.p.pose === 'back') drawBackChar(c, now);

    // Framing marble columns, with stronger parallax
    ctx.drawImage(fgCanvas, -12 + camX * 2, -12 + camY * 2, SCENE_W + 24, SCENE_H + 24);

    requestAnimationFrame(render);
}
requestAnimationFrame(render);

/* ============================================================
 * Speech bubbles (DOM overlay, typing effect)
 * ============================================================ */
const activeBubbles = new Map(); // persona id -> element

function removeBubble(id) {
    const el = activeBubbles.get(id);
    if (!el) return;
    activeBubbles.delete(id);
    el.classList.remove('visible');
    el.classList.add('hiding');
    setTimeout(() => el.remove(), 350);
}

function speak(persona, text) {
    return new Promise(resolve => {
        const c = chars.find(x => x.p === persona);
        for (const other of chars) other.state = other === c ? 'speaking' : 'listening';
        removeBubble(persona.id);

        const el = document.createElement('div');
        el.className = 'bubble';
        el.style.borderColor = persona.color;
        el.style.background = persona.color + 'cc'; // ~80% opacity
        el.style.color = persona.textColor;

        const name = document.createElement('span');
        name.className = 'speaker-name';
        name.textContent = persona.name;
        const body = document.createElement('span');
        const tail = document.createElement('div');
        tail.className = 'tail';
        tail.style.borderTopColor = persona.color;
        el.append(name, body, tail);

        // Clamp so the bubble (max-width 34%, centered on the speaker) stays on screen
        el.style.left = Math.min(82, Math.max(18, persona.bubble.x / SCENE_W * 100)) + '%';
        el.style.top = Math.max(2, persona.bubble.y / SCENE_H * 100) + '%';
        bubbleLayer.appendChild(el);
        activeBubbles.set(persona.id, el);
        requestAnimationFrame(() => el.classList.add('visible'));

        // Typing effect: character by character, slight pause between words
        let i = 0;
        const step = () => {
            if (!activeBubbles.has(persona.id)) { finish(); return; } // was cleared (abort)
            i++;
            body.textContent = text.slice(0, i);
            if (i < text.length) {
                const pause = text[i - 1] === ' ' ? TYPE_SPEED_MS * 2.5 : TYPE_SPEED_MS;
                setTimeout(step, pause);
            } else {
                setTimeout(finish, BUBBLE_LINGER_MS);
            }
        };
        const finish = () => {
            removeBubble(persona.id);
            if (c) c.state = 'idle';
            for (const other of chars) if (other.state === 'listening') other.state = 'idle';
            resolve();
        };
        step();
    });
}

function clearAllBubbles() {
    for (const id of [...activeBubbles.keys()]) removeBubble(id);
}

/* ============================================================
 * Status messages
 * ============================================================ */
let statusTimer = null;
function setStatus(msg, { error = false, sticky = false } = {}) {
    clearTimeout(statusTimer);
    statusEl.textContent = msg;
    statusEl.classList.toggle('error', error);
    statusEl.classList.add('visible');
    if (!sticky) statusTimer = setTimeout(() => statusEl.classList.remove('visible'), 6000);
}

/* ============================================================
 * OpenRouter API
 * ============================================================ */
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function callAgent(persona, userContent, signal) {
    const key = keyInput.value.trim();
    const model = modelInput.value.trim() || DEFAULT_MODEL;
    let lastErr;
    for (let attempt = 0; attempt < 3; attempt++) {
        if (attempt > 0) await sleep(3000 * attempt);
        try {
            const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                method: 'POST',
                signal,
                headers: {
                    'Authorization': 'Bearer ' + key,
                    'Content-Type': 'application/json',
                    'X-Title': 'Socratic Approach'
                },
                body: JSON.stringify({
                    model,
                    max_tokens: 300,
                    messages: [
                        { role: 'system', content: persona.system },
                        { role: 'user', content: userContent }
                    ]
                })
            });
            if (res.status === 429 || res.status >= 500) {
                lastErr = new Error('OpenRouter is rate-limiting (HTTP ' + res.status + ')');
                continue; // retry with backoff
            }
            if (!res.ok) {
                const detail = await res.json().catch(() => null);
                throw new Error((detail && detail.error && detail.error.message) ||
                                'OpenRouter error (HTTP ' + res.status + ')');
            }
            const data = await res.json();
            const text = data.choices && data.choices[0] &&
                         data.choices[0].message && data.choices[0].message.content;
            if (!text || !text.trim()) { lastErr = new Error('Empty response from model'); continue; }
            return text.trim();
        } catch (e) {
            if (e.name === 'AbortError') throw e;
            lastErr = e;
        }
    }
    throw lastErr || new Error('OpenRouter request failed');
}

/* ============================================================
 * Debate orchestration
 * ============================================================ */
function buildPrompt(topic, transcript, extra) {
    let out = 'The topic under debate: "' + topic + '"\n\n';
    if (transcript.length) {
        out += 'Transcript so far:\n';
        for (const turn of transcript) out += turn.speaker + ': ' + turn.text + '\n';
        out += '\n';
    }
    out += extra || 'It is now your turn to speak.';
    return out;
}

const VERDICT_RE = /\bVERDICT:\s*(CONSENSUS|CONTINUE)\b/i;
const SPEAKING_ORDER = ['socrates', 'contrarian', 'freethinker', 'grump', 'synthesizer'];

let controller = null;

async function runDebate(topic) {
    const transcript = [];
    const debaters = SPEAKING_ORDER.map(id => PERSONAS.find(p => p.id === id));
    const judge = PERSONAS.find(p => p.id === 'judge');
    const signal = controller.signal;
    let consensus = false;

    for (let round = 1; round <= MAX_TURNS && !consensus; round++) {
        for (const p of debaters) {
            if (signal.aborted) return;
            setStatus(p.name + ' is thinking… (round ' + round + '/' + MAX_TURNS + ')', { sticky: true });
            const text = await callAgent(p, buildPrompt(topic, transcript), signal);
            if (signal.aborted) return;
            transcript.push({ speaker: p.name, text });
            await speak(p, text);
            await sleep(API_DELAY_MS);
        }

        if (signal.aborted) return;
        setStatus('The Judge is deliberating…', { sticky: true });
        const evalPrompt = buildPrompt(topic, transcript,
            'It is now your turn to speak. Briefly assess the round, then end your reply with a ' +
            'final line reading exactly "VERDICT: CONSENSUS" if the group has substantially ' +
            'converged, or "VERDICT: CONTINUE" if the debate should go on.');
        const raw = await callAgent(judge, evalPrompt, signal);
        if (signal.aborted) return;
        const m = raw.match(VERDICT_RE);
        consensus = !!(m && m[1].toUpperCase() === 'CONSENSUS');
        const clean = raw.replace(VERDICT_RE, '').replace(/\n{2,}/g, '\n').trim();
        transcript.push({ speaker: judge.name, text: clean });
        await speak(judge, clean);
        await sleep(API_DELAY_MS);
    }

    if (signal.aborted) return;
    setStatus('The Judge prepares the final verdict…', { sticky: true });
    const summary = await callAgent(judge, buildPrompt(topic, transcript,
        'The debate has ended. Deliver the final verdict: name the strongest arguments heard and ' +
        'state the group\'s consensus position on the topic in at most five sentences.'), signal);
    if (signal.aborted) return;
    await speak(judge, summary);
    setStatus(consensus ? 'Consensus reached. The agora falls quiet.'
                        : 'No full consensus — the Judge has ruled.');
}

/* ============================================================
 * UI wiring
 * ============================================================ */
const topicInput = document.getElementById('topic-input');
const keyInput = document.getElementById('key-input');
const modelInput = document.getElementById('model-input');
const startBtn = document.getElementById('start-btn');
const stopBtn = document.getElementById('stop-btn');

modelInput.value = localStorage.getItem('sa_model') || DEFAULT_MODEL;
keyInput.value = localStorage.getItem('sa_or_key') || '';

function setRunning(running) {
    startBtn.disabled = running;
    topicInput.disabled = running;
    stopBtn.style.display = running ? 'inline-block' : 'none';
}

startBtn.addEventListener('click', async () => {
    const topic = topicInput.value.trim();
    if (!topic) { setStatus('Offer the assembly a question first.', { error: true }); topicInput.focus(); return; }
    if (!keyInput.value.trim()) { setStatus('An OpenRouter API key is required.', { error: true }); keyInput.focus(); return; }

    localStorage.setItem('sa_or_key', keyInput.value.trim());
    localStorage.setItem('sa_model', modelInput.value.trim() || DEFAULT_MODEL);

    controller = new AbortController();
    setRunning(true);
    setStatus('The philosophers gather…', { sticky: true });
    try {
        await runDebate(topic);
    } catch (e) {
        if (e.name !== 'AbortError') setStatus(e.message || 'The debate faltered.', { error: true });
    } finally {
        controller = null;
        clearAllBubbles();
        for (const c of chars) c.state = 'idle';
        setRunning(false);
    }
});

stopBtn.addEventListener('click', () => {
    if (controller) controller.abort();
    clearAllBubbles();
    setStatus('The debate was adjourned.');
});

topicInput.addEventListener('keydown', e => { if (e.key === 'Enter') startBtn.click(); });

setStatus('Welcome to the agora. Pose a question to begin.');
</script>
