<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Socratic Approach - Multi-Agent Debate</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
    :root {
        --background: #2a2119;
        --surface: #3a2f22;
        --text: #f1e9d9;
        --text-secondary: #b3a58c;
        --border: #6b5d4a;
        --warning: #f59e0b;
        --parchment: #f5e9d3;
        --parchment-ink: #44403c;
        --stone-light: #d9c9a3;
        --stone-mid: #a8946c;
        --stone-dark: #6b5a3e;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Press Start 2P', monospace;
        background-color: var(--background);
        color: var(--text);
        line-height: 1.6;
        min-height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    #game-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
    }

    #canvas-container {
        flex: 1;
        position: relative;
        min-height: 0;
        background: #1c1610;
    }

    /* Stage is sized by JS to a centered 16:9 box inside #canvas-container.
       The bubble layer shares its coordinate space with the canvas. */
    #stage {
        position: absolute;
    }

    #debate-canvas {
        display: block;
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
    }

    #bubble-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
    }

    .bubble {
        position: absolute;
        transform: translate(-50%, -100%) scale(1);
        max-width: 34%;
        min-width: 120px;
        padding: 10px;
        border: 2px solid;
        border-radius: 5px;
        font-size: 9px;
        line-height: 1.7;
        word-wrap: break-word;
        image-rendering: pixelated;
        transition: opacity 0.3s steps(4), transform 0.3s steps(4);
        opacity: 0;
    }

    .bubble.visible { opacity: 1; }
    .bubble.hiding  { opacity: 0; transform: translate(-50%, -60%) scale(0.4); }

    .bubble .speaker-name {
        display: block;
        font-size: 8px;
        margin-bottom: 6px;
        opacity: 0.9;
        text-transform: uppercase;
    }

    .bubble .tail {
        position: absolute;
        left: 50%;
        bottom: -10px;
        transform: translateX(-50%);
        width: 0;
        height: 0;
        border-left: 8px solid transparent;
        border-right: 8px solid transparent;
        border-top: 10px solid;
    }

    #status-scroll {
        position: absolute;
        left: 50%;
        bottom: 12px;
        transform: translateX(-50%);
        background: var(--parchment);
        color: var(--parchment-ink);
        border: 3px solid var(--stone-dark);
        border-left-width: 10px;
        border-right-width: 10px;
        border-radius: 3px;
        padding: 8px 14px;
        font-size: 9px;
        max-width: 80%;
        text-align: center;
        transition: opacity 0.4s steps(4);
        opacity: 0;
        pointer-events: none;
    }

    #status-scroll.visible { opacity: 0.95; }
    #status-scroll.error { color: #991b1b; }

    #input-section {
        background: var(--surface);
        border-top: 4px solid var(--stone-dark);
        padding: 12px 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: stretch;
    }

    .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        flex: 1;
        min-width: 160px;
    }

    .field.grow-2 { flex: 3; min-width: 240px; }

    .field label {
        font-size: 8px;
        color: var(--text-secondary);
        text-transform: uppercase;
    }

    .field input {
        font-family: 'Press Start 2P', monospace;
        font-size: 10px;
        color: var(--parchment-ink);
        background: var(--parchment);
        border: 3px solid var(--stone-mid);
        border-radius: 2px;
        padding: 9px 10px;
        outline: none;
        box-shadow: inset 2px 2px 0 rgba(107, 90, 62, 0.35);
        caret-color: var(--parchment-ink);
    }

    .field input:focus { border-color: var(--warning); }

    .buttons {
        display: flex;
        align-items: flex-end;
        gap: 10px;
    }

    button {
        font-family: 'Press Start 2P', monospace;
        font-size: 10px;
        color: #fff8ec;
        background: linear-gradient(180deg, var(--stone-light) 0%, var(--stone-mid) 55%, var(--stone-dark) 100%);
        border: 3px solid var(--stone-dark);
        border-radius: 3px;
        padding: 12px 16px;
        cursor: pointer;
        text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.6);
        box-shadow: 0 4px 0 #241c12;
    }

    button:hover:not(:disabled) {
        background: linear-gradient(180deg, #e8dcc0 0%, var(--stone-light) 55%, var(--stone-mid) 100%);
    }

    button:active:not(:disabled) {
        transform: translateY(3px);
        box-shadow: 0 1px 0 #241c12;
    }

    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #stop-btn { display: none; }
</style>
</head>
<body>
<div id="game-container">
    <div id="canvas-container">
        <div id="stage">
            <canvas id="debate-canvas" width="960" height="540"></canvas>
            <div id="bubble-layer"></div>
            <div id="status-scroll"></div>
        </div>
    </div>
    <div id="input-section">
        <div class="field grow-2">
            <label for="topic-input">Question / Idea / Belief</label>
            <input id="topic-input" type="text" maxlength="300"
                   placeholder="e.g. Is honesty always the best policy?">
        </div>
        <div class="field">
            <label for="key-input">OpenRouter API Key</label>
            <input id="key-input" type="password" placeholder="sk-or-..." autocomplete="off">
        </div>
        <div class="field">
            <label for="model-input">Model</label>
            <input id="model-input" type="text" spellcheck="false">
        </div>
        <div class="buttons">
            <button id="start-btn">Begin Debate</button>
            <button id="stop-btn">Stop</button>
        </div>
    </div>
</div>

<script>
'use strict';

/* ============================================================
 * Configuration
 * ============================================================ */
const DEFAULT_MODEL = 'meta-llama/llama-3.3-70b-instruct:free';
const MAX_TURNS = 3;          // debate rounds before the Judge must rule
const API_DELAY_MS = 1200;    // pause between calls (free-tier rate limits)
const TYPE_SPEED_MS = 22;     // typing effect, per character
const BUBBLE_LINGER_MS = 1000;

const SCENE_W = 960, SCENE_H = 540;

/* ============================================================
 * Rendering pipeline
 *
 * The scene is PAINTED smoothly — gradients, curves, soft
 * shading, real anatomy — on a hi-res buffer, then downsampled
 * to a 320x180 pixel grid, palette-posterized with ordered
 * (Bayer) dithering, and upscaled 3x with nearest-neighbour.
 * That is what produces the dense, hand-shaded pixel-art look:
 * painterly rendering quantized onto a pixel grid.
 * ============================================================ */
const LO_W = 320, LO_H = 180;
const FACING_K = 1.22, BACK_K = 1.15;   // figure scale: fill the frame like the reference art
const HOR = 200, WALL_T = 228, FLOOR_Y = 276;   // horizon / parapet / floor (hi-res px)

/* ---------- small painting helpers ---------- */
function shift(hex, d) {
    const n = parseInt(hex.slice(1), 16);
    const c = v => Math.max(0, Math.min(255, v));
    return `rgb(${c((n >> 16) + d)},${c((n >> 8 & 255) + d)},${c((n & 255) + d)})`;
}
function ramp(base) { return { l: shift(base, 30), b: base, s: shift(base, -30), d: shift(base, -58) }; }

function ell(g, x, y, rx, ry, fill, rot = 0) {
    g.beginPath(); g.ellipse(x, y, rx, ry, rot, 0, 6.2832); g.fillStyle = fill; g.fill();
}
function cap(g, pts, w, col) {
    g.strokeStyle = col; g.lineWidth = w; g.lineCap = 'round'; g.lineJoin = 'round';
    g.beginPath(); g.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) g.lineTo(pts[i][0], pts[i][1]);
    g.stroke();
}
// Smooth curve through points (quadratic midpoint smoothing)
function flow(g, pts, w, col) {
    g.strokeStyle = col; g.lineWidth = w; g.lineCap = 'round';
    g.beginPath(); g.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length - 1; i++) {
        const xc = (pts[i][0] + pts[i + 1][0]) / 2, yc = (pts[i][1] + pts[i + 1][1]) / 2;
        g.quadraticCurveTo(pts[i][0], pts[i][1], xc, yc);
    }
    const last = pts[pts.length - 1];
    g.lineTo(last[0], last[1]); g.stroke();
}
function lgrad(g, x0, y0, x1, y1, stops) {
    const G = g.createLinearGradient(x0, y0, x1, y1);
    for (const [o, c] of stops) G.addColorStop(o, c);
    return G;
}
function softShadow(g, x, y, rx, ry, alpha) {
    const G = g.createRadialGradient(x, y, 1, x, y, rx);
    G.addColorStop(0, `rgba(58,42,20,${alpha})`);
    G.addColorStop(1, 'rgba(58,42,20,0)');
    g.save(); g.translate(x, y); g.scale(1, ry / rx); g.translate(-x, -y);
    g.beginPath(); g.arc(x, y, rx, 0, 6.2832); g.fillStyle = G; g.fill();
    g.restore();
}
function mulberry32(seed) {
    return function () {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}

/* ============================================================
 * Personas
 * ============================================================ */
const STYLE_RULES = 'Stay strictly in character. Reply in 2-4 short sentences of plain ' +
    'spoken prose: no markdown, no lists, no stage directions, no quotation of your own name.';

const PERSONAS = [
    {
        id: 'grump', name: 'Grump', color: '#78716c', textColor: '#ffffff',
        system: 'You are the Grump, the closed-minded critic in a debate among six ancient ' +
            'Greek philosophers. Be cynical, dismissive and resistant to new ideas: voice ' +
            'doubts, grumble about impracticality, and puncture enthusiasm. ' + STYLE_RULES,
        pose: 'back', x: 105, side: 1,
        sprite: { skin: '#d9b48a', cloth: '#8d867b', hair: '#a8a29a', slouch: true, messy: true }
    },
    {
        id: 'contrarian', name: 'Contrarian', color: '#ef4444', textColor: '#ffffff',
        system: 'You are the Contrarian, the devil\'s advocate in a debate among six ancient ' +
            'Greek philosophers. Whatever position currently dominates the discussion, argue ' +
            'the opposite, sharply but honestly, to test the strength of the idea. ' + STYLE_RULES,
        pose: 'facing', x: 292, fy: 470, lean: -0.035,
        sprite: { skin: '#c98850', cloth: '#eadfc6', drape: '#b5443f', trim: '#d9a441',
                  hair: { color: '#3a2a1e', style: 'short' }, crossedArms: true, brow: 'frown' }
    },
    {
        id: 'socrates', name: 'Socrates', color: '#2563eb', textColor: '#ffffff',
        system: 'You are Socrates, the probing questioner in a debate among six ancient Greek ' +
            'philosophers. Use the Socratic method: never state your own opinion. Ask short, ' +
            'pointed questions that expose hidden assumptions and contradictions in the topic ' +
            'or in what the others have said. ' + STYLE_RULES,
        pose: 'facing', x: 440, fy: 456, lean: 0.02,
        sprite: { skin: '#e8c39a', cloth: '#efe6d2', drape: '#4a7fb5',
                  bald: true, beard: '#e8e2d4', staff: true, brow: 'calm' }
    },
    {
        id: 'freethinker', name: 'Free Thinker', color: '#8b5cf6', textColor: '#ffffff',
        system: 'You are the Free Thinker, the open-minded explorer in a debate among six ' +
            'ancient Greek philosophers. Be creative and speculative: expand the space of ' +
            'possibilities, question constraints, and offer unconventional angles no one else ' +
            'has considered. ' + STYLE_RULES,
        pose: 'facing', x: 588, fy: 464, lean: 0.045,
        sprite: { skin: '#8a5a36', cloth: '#e8e0d0', drape: '#7d5fa8',
                  hair: { color: '#45306b', style: 'wild' }, brow: 'calm' }
    },
    {
        id: 'judge', name: 'Judge', color: '#f59e0b', textColor: '#3b2205',
        system: 'You are the Judge, the arbitrator in a debate among six ancient Greek ' +
            'philosophers. Be fair and decisive: weigh the arguments made so far, name the ' +
            'strongest points on each side, and guide the group toward consensus. ' + STYLE_RULES,
        pose: 'facing', x: 712, fy: 476, lean: -0.02,
        sprite: { skin: '#d9a066', cloth: '#f0e6cc', drape: '#d08a2e', trim: '#d08a2e', laurel: '#d4a437',
                  hair: { color: '#4a4440', style: 'short' }, brow: 'stern' }
    },
    {
        id: 'synthesizer', name: 'Synthesizer', color: '#10b981', textColor: '#062e24',
        system: 'You are the Synthesizer, the integrator in a debate among six ancient Greek ' +
            'philosophers. Be balanced and analytical: identify common ground between the ' +
            'speakers, reconcile opposing views, and restate the emerging shared position. ' +
            STYLE_RULES,
        pose: 'back', x: 855, side: -1,
        sprite: { skin: '#c98850', cloth: '#e3dabf', wrap: '#5f8760', hair: '#35302a' }
    }
];

for (const p of PERSONAS) {
    const s = p.sprite;
    s.skinR = ramp(s.skin);
    s.clothR = ramp(s.cloth);
    if (s.drape) s.drapeR = ramp(s.drape);
    if (s.wrap) s.wrapR = ramp(s.wrap);
    if (p.pose === 'facing') {
        p.lapY = p.fy - 118; p.hipY = p.lapY + 26;
        p.shY = p.lapY - 78; p.headC = p.shY - 44;
        p.bubble = { x: p.x, y: p.fy - (p.fy - (p.headC - 40)) * FACING_K };
    } else {
        p.headC = 130 + (s.slouch ? 14 : 0);
        p.bubble = { x: p.x, y: SCENE_H - (SCENE_H - (p.headC - 52)) * BACK_K };
    }
}

/* ============================================================
 * Stage layout (letterboxed 16:9 canvas + overlay)
 * ============================================================ */
const stage = document.getElementById('stage');
const canvas = document.getElementById('debate-canvas');
const ctx = canvas.getContext('2d');
const bubbleLayer = document.getElementById('bubble-layer');
const statusEl = document.getElementById('status-scroll');

function layoutStage() {
    const box = document.getElementById('canvas-container').getBoundingClientRect();
    const scale = Math.min(box.width / SCENE_W, box.height / SCENE_H);
    const w = Math.floor(SCENE_W * scale), h = Math.floor(SCENE_H * scale);
    stage.style.width = w + 'px';
    stage.style.height = h + 'px';
    stage.style.left = Math.floor((box.width - w) / 2) + 'px';
    stage.style.top = Math.floor((box.height - h) / 2) + 'px';
}
window.addEventListener('resize', layoutStage);
layoutStage();

/* ============================================================
 * Background — painted once, smoothly
 * ============================================================ */
function paintBackground() {
    const cv = document.createElement('canvas');
    cv.width = SCENE_W; cv.height = SCENE_H;
    const g = cv.getContext('2d');
    const rand = mulberry32(20260703);

    // Sky
    g.fillStyle = lgrad(g, 0, 0, 0, HOR, [[0, '#3f8fc4'], [0.55, '#7fb9de'], [1, '#c8e2f0']]);
    g.fillRect(0, 0, SCENE_W, HOR);
    for (let i = 0; i < 8; i++) {                                     // clouds
        const cx = rand() * SCENE_W, cy = 20 + rand() * 95, sc = 0.7 + rand() * 1.1;
        ell(g, cx - 26 * sc, cy + 4 * sc, 26 * sc, 10 * sc, 'rgba(238,231,212,0.95)');
        ell(g, cx + 20 * sc, cy + 5 * sc, 30 * sc, 9 * sc, 'rgba(238,231,212,0.9)');
        ell(g, cx, cy - 4 * sc, 30 * sc, 13 * sc, 'rgba(255,253,246,0.95)');
        ell(g, cx - 12 * sc, cy - 10 * sc, 16 * sc, 9 * sc, '#fffdf6');
        ell(g, cx + 2 * sc, cy + 9 * sc, 34 * sc, 5 * sc, 'rgba(214,205,182,0.5)');
    }

    // Sea
    g.fillStyle = lgrad(g, 0, HOR, 0, WALL_T, [[0, '#2e6d9c'], [0.35, '#3f86b8'], [1, '#6fb4d8']]);
    g.fillRect(0, HOR, SCENE_W, WALL_T - HOR);
    g.strokeStyle = 'rgba(255,255,255,0.5)'; g.lineWidth = 1.6;
    for (let i = 0; i < 70; i++) {
        const sx = rand() * SCENE_W, sy = HOR + 3 + rand() * 22;
        g.beginPath(); g.moveTo(sx, sy); g.lineTo(sx + 4 + rand() * 8, sy); g.stroke();
    }
    ell(g, 150, HOR - 3, 34, 7, '#7d8a94');                            // islands
    ell(g, 300, HOR - 4, 20, 5, '#8b98a2');
    ell(g, 392, HOR - 3, 24, 6, '#7d8a94');

    // Whitewashed town on the far left coast
    g.fillStyle = '#96a877';
    g.beginPath(); g.moveTo(0, HOR); g.lineTo(0, 178);
    g.quadraticCurveTo(90, 168, 190, 186); g.lineTo(196, HOR); g.closePath(); g.fill();
    for (let i = 0; i < 16; i++) {
        const tx = 6 + rand() * 170, ty = 180 + rand() * 14;
        g.fillStyle = '#f2ead9'; g.fillRect(tx, ty, 4 + rand() * 4, 4);
        g.fillStyle = '#b0663a'; g.fillRect(tx, ty - 1.5, 4 + rand() * 4, 1.5);
    }

    // Acropolis headland
    g.beginPath(); g.moveTo(596, HOR);
    g.quadraticCurveTo(760, 128, 960, 92);
    g.lineTo(960, HOR); g.closePath();
    g.fillStyle = lgrad(g, 0, 92, 0, HOR, [[0, '#bda478'], [0.5, '#a08a5f'], [1, '#8f7a50']]);
    g.fill();
    g.strokeStyle = '#cdb78a'; g.lineWidth = 3;
    g.beginPath(); g.moveTo(600, HOR - 2); g.quadraticCurveTo(760, 128, 958, 92); g.stroke();
    for (let i = 0; i < 26; i++) {                                     // olive scrub
        const hx = 620 + rand() * 330, hy = 132 + (hx - 620) / 330 * -20 + rand() * 46 + 22;
        if (hy < HOR - 4) ell(g, hx, hy, 5 + rand() * 5, 3 + rand() * 2, i % 3 ? '#7a9a5a' : '#5f7f46');
    }
    // Temple on the crest
    g.fillStyle = '#d9cbb0'; g.fillRect(742, 96, 152, 5);              // stylobate
    g.fillStyle = '#c9b894'; g.fillRect(748, 101, 140, 4);
    for (let i = 0; i < 9; i++) {
        g.fillStyle = '#ede4d0'; g.fillRect(748 + i * 17, 64, 9, 32);
        g.fillStyle = '#c9b894'; g.fillRect(754 + i * 17, 64, 3, 32);
    }
    g.fillStyle = '#e6d9bd'; g.fillRect(740, 56, 156, 8);              // entablature
    g.beginPath(); g.moveTo(736, 56); g.lineTo(818, 30); g.lineTo(900, 56); g.closePath();
    g.fillStyle = '#efe5cf'; g.fill();
    g.strokeStyle = '#c9b894'; g.lineWidth = 2; g.stroke();
    // Ruined colonnade lower down
    for (let i = 0; i < 3; i++) { g.fillStyle = '#ded0b2'; g.fillRect(642 + i * 13, 168 - i * 2, 6, 22 + i * 2); }
    g.fillStyle = '#c9b894'; g.fillRect(638, 164, 44, 4);
    // Cypresses
    for (const [tx, ty, th] of [[634, 178, 34], [668, 184, 26], [925, 132, 30]]) {
        g.beginPath(); g.moveTo(tx, ty - th);
        g.quadraticCurveTo(tx + 5, ty - th / 2, tx + 3.5, ty);
        g.lineTo(tx - 3.5, ty);
        g.quadraticCurveTo(tx - 5, ty - th / 2, tx, ty - th); g.closePath();
        g.fillStyle = '#2f4f34'; g.fill();
        g.strokeStyle = 'rgba(120,160,110,0.5)'; g.lineWidth = 1.5;
        g.beginPath(); g.moveTo(tx - 2, ty - th + 6); g.quadraticCurveTo(tx - 3.5, ty - th / 2, tx - 2.5, ty - 3); g.stroke();
    }

    // Parapet wall
    g.fillStyle = '#f0e4c6'; g.fillRect(0, WALL_T, SCENE_W, 10);        // coping
    g.fillStyle = '#f9f1dd'; g.fillRect(0, WALL_T, SCENE_W, 3);
    g.fillStyle = '#a8946c'; g.fillRect(0, WALL_T + 10, SCENE_W, 3);
    g.fillStyle = lgrad(g, 0, WALL_T + 13, 0, FLOOR_Y, [[0, '#dcCDa7'.toLowerCase()], [1, '#c9b58c']]);
    g.fillRect(0, WALL_T + 13, SCENE_W, FLOOR_Y - WALL_T - 13);
    g.strokeStyle = 'rgba(143,122,80,0.4)'; g.lineWidth = 2;
    for (let x = 24; x < SCENE_W; x += 46) {
        g.beginPath(); g.moveTo(x, WALL_T + 13); g.lineTo(x, FLOOR_Y); g.stroke();
    }
    g.beginPath(); g.moveTo(0, WALL_T + 34); g.lineTo(SCENE_W, WALL_T + 34); g.stroke();
    for (let i = 0; i < 22; i++)                                        // weather stains
        ell(g, rand() * SCENE_W, WALL_T + 16 + rand() * 40, 6 + rand() * 10, 3, 'rgba(160,138,96,0.35)');

    // Potted olive standing on the parapet
    ell(g, 660, 190, 26, 20, '#6f8f6a');
    ell(g, 646, 182, 14, 11, '#87a781'); ell(g, 674, 180, 13, 10, '#5c7d58');
    ell(g, 662, 200, 17, 9, '#57705a');
    g.strokeStyle = '#7c5a3a'; g.lineWidth = 4;
    g.beginPath(); g.moveTo(660, 228); g.quadraticCurveTo(658, 214, 661, 202); g.stroke();
    g.fillStyle = '#c47a4a'; g.fillRect(646, 222, 28, 6);
    g.beginPath(); g.moveTo(648, 228); g.lineTo(672, 228); g.lineTo(668, 246); g.lineTo(652, 246); g.closePath();
    g.fillStyle = lgrad(g, 646, 0, 674, 0, [[0, '#cc8352'], [0.55, '#b0663a'], [1, '#8a4a28']]); g.fill();

    // Floor
    g.fillStyle = lgrad(g, 0, FLOOR_Y, 0, SCENE_H, [[0, '#e4d5ae'], [0.5, '#dccca6'], [1, '#d0be96']]);
    g.fillRect(0, FLOOR_Y, SCENE_W, SCENE_H - FLOOR_Y);
    g.fillStyle = 'rgba(143,122,80,0.35)'; g.fillRect(0, FLOOR_Y, SCENE_W, 4);
    const rows = [284, 300, 320, 344, 372, 404, 440, 480, 524];
    g.strokeStyle = 'rgba(140,115,80,0.45)'; g.lineWidth = 2;
    for (const y of rows) { g.beginPath(); g.moveTo(0, y); g.lineTo(SCENE_W, y); g.stroke(); }
    for (let i = 0; i < rows.length - 1; i++) {
        const span = 88 + i * 20;
        for (let x = (i % 2) * (span / 2); x < SCENE_W; x += span) {
            g.beginPath(); g.moveTo(x, rows[i]); g.lineTo(x, rows[i + 1]); g.stroke();
        }
    }
    for (let i = 0; i < 90; i++)                                        // wear
        ell(g, rand() * SCENE_W, FLOOR_Y + 8 + rand() * (SCENE_H - FLOOR_Y - 12),
            3 + rand() * 6, 1.6, rand() > 0.5 ? 'rgba(120,98,64,0.18)' : 'rgba(255,246,222,0.25)');

    // Mosaic medallion, on the open floor in front of the benches
    const mx = 500, my = 506;
    ell(g, mx, my, 96, 33, '#b8a67f');
    ell(g, mx, my, 86, 29, '#e8dcc0');
    ell(g, mx, my, 66, 22, '#6d98b4');
    ell(g, mx, my, 48, 16, '#e8dcc0');
    ell(g, mx, my, 32, 10.5, '#b04a3e');
    ell(g, mx, my, 18, 6, '#e8dcc0');
    g.strokeStyle = 'rgba(90,74,48,0.3)'; g.lineWidth = 1.5;
    for (let i = 0; i < 3; i++) { g.beginPath(); g.ellipse(mx, my, 56 + i * 14, 18.5 + i * 4.8, 0, 0, 6.2832); g.stroke(); }

    // Amphora
    const ax = 330, ay = 462;
    g.fillStyle = '#8a4a28'; g.fillRect(ax - 10, ay - 4, 20, 5);
    g.fillStyle = '#b0663a'; g.fillRect(ax - 6, ay, 12, 10);
    g.beginPath(); g.moveTo(ax - 6, ay + 10);
    g.bezierCurveTo(ax - 26, ay + 16, ax - 24, ay + 46, ax - 8, ay + 56);
    g.lineTo(ax + 8, ay + 56);
    g.bezierCurveTo(ax + 24, ay + 46, ax + 26, ay + 16, ax + 6, ay + 10);
    g.closePath();
    g.fillStyle = lgrad(g, ax - 24, 0, ax + 24, 0, [[0, '#cc8352'], [0.5, '#b0663a'], [1, '#7a4020']]);
    g.fill();
    g.fillStyle = '#7a4020'; g.fillRect(ax - 8, ay + 56, 16, 5);
    g.fillStyle = '#5f3420'; g.fillRect(ax - 20, ay + 24, 40, 5);
    g.strokeStyle = '#8a4a28'; g.lineWidth = 4;
    g.beginPath(); g.moveTo(ax - 12, ay + 4); g.quadraticCurveTo(ax - 24, ay + 8, ax - 18, ay + 20); g.stroke();
    g.beginPath(); g.moveTo(ax + 12, ay + 4); g.quadraticCurveTo(ax + 24, ay + 8, ax + 18, ay + 20); g.stroke();
    softShadow(g, ax, ay + 62, 30, 7, 0.4);

    // Discarded scroll
    g.fillStyle = '#efe5cf'; g.fillRect(614, 508, 26, 8);
    g.fillStyle = '#f7f0dd'; g.fillRect(614, 508, 26, 2.5);
    g.fillStyle = '#c9b894'; g.fillRect(612, 508, 2.5, 8); g.fillRect(639, 508, 2.5, 8);
    return cv;
}

// Foreground framing columns (with alpha, drawn over the figures)
function paintForeground() {
    const cv = document.createElement('canvas');
    cv.width = SCENE_W; cv.height = SCENE_H;
    const g = cv.getContext('2d');
    for (const [x0, flip] of [[0, false], [SCENE_W - 42, true]]) {
        g.fillStyle = lgrad(g, x0, 0, x0 + 42, 0,
            flip ? [[0, '#c9b184'], [0.4, '#ede4d0'], [1, '#f7f0dd']]
                 : [[0, '#f7f0dd'], [0.6, '#ede4d0'], [1, '#c9b184']]);
        g.fillRect(x0, 0, 42, SCENE_H);
        g.strokeStyle = 'rgba(150,128,88,0.5)'; g.lineWidth = 2.5;
        for (let i = 1; i < 5; i++) {
            g.beginPath(); g.moveTo(x0 + i * 8.5, 30); g.lineTo(x0 + i * 8.5, SCENE_H); g.stroke();
        }
        g.fillStyle = '#e6d9bd'; g.fillRect(x0 - (flip ? 6 : 0), 12, 48, 13);   // echinus
        g.fillStyle = '#efe5cf'; g.fillRect(x0 - (flip ? 6 : 0), 0, 48, 12);    // abacus
        g.fillStyle = 'rgba(150,128,88,0.55)'; g.fillRect(x0 - (flip ? 6 : 0), 25, 48, 4);
        g.fillStyle = '#e0d3b4'; g.fillRect(x0 - (flip ? 6 : 0), SCENE_H - 36, 48, 36);
        g.fillStyle = 'rgba(150,128,88,0.55)'; g.fillRect(x0 - (flip ? 6 : 0), SCENE_H - 36, 48, 4);
    }
    return cv;
}

/* ============================================================
 * Characters — painted smoothly each frame
 * ============================================================ */
const hi = document.createElement('canvas'); hi.width = SCENE_W; hi.height = SCENE_H;
const hictx = hi.getContext('2d');
const lo = document.createElement('canvas'); lo.width = LO_W; lo.height = LO_H;
const loctx = lo.getContext('2d', { willReadFrequently: true });
const bgHi = paintBackground();
const fgHi = paintForeground();
ctx.imageSmoothingEnabled = false;

const chars = PERSONAS.map((p, i) => {
    const rng = mulberry32(1234 + i * 777);
    const tufts = [];
    for (let k = 0; k < 9; k++) tufts.push([rng(), rng(), rng()]);
    return {
        p, tufts,
        state: 'idle',
        phase: Math.random() * Math.PI * 2,
        nextBlink: performance.now() + 1500 + Math.random() * 3000,
        blinkUntil: 0,
        nextNod: performance.now() + 3000 + Math.random() * 5000,
        nodUntil: 0
    };
});

function animState(c, now) {
    const t = now / 1000;
    if (now >= c.nextBlink) { c.blinkUntil = now + 130; c.nextBlink = now + 1800 + Math.random() * 3500; }
    let nod = 0;
    if (c.state === 'speaking') {
        nod = Math.sin(t * 5.5 + c.phase) > 0.55 ? 1 : 0;
    } else if (c.state === 'listening') {
        if (now >= c.nextNod) { c.nodUntil = now + 550; c.nextNod = now + 2500 + Math.random() * 5000; }
        if (now < c.nodUntil) nod = Math.floor((now - (c.nodUntil - 550)) / 140) % 2;
    }
    return {
        t,
        bob: Math.sin(t * 1.7 + c.phase) > 0 ? 0 : -2,
        blink: now < c.blinkUntil,
        nod: nod * 2,
        turn: c.state !== 'speaking' ? Math.round(Math.sin(t * 0.35 + c.phase * 2) * 0.9) * 2 : 0,
        gesture: c.state === 'speaking' ? Math.floor(t * 2.2) % 3 : -1,
        mouthFrame: c.state === 'speaking' ? Math.floor(now / 130) % 3 : -1
    };
}

/* ---------- facing, seated ---------- */
function drawFacing(c, now) {
    const g = hictx, p = c.p, s = p.sprite, a = animState(c, now);
    const cx = p.x, fy = p.fy;
    const ly = p.lapY, hip = p.hipY;
    const shY = p.shY + a.bob, hc = p.headC + a.bob + a.nod, tn = a.turn;
    const sk = s.skinR, cl = s.clothR;

    g.save();
    g.translate(cx, fy); g.rotate(p.lean || 0); g.scale(FACING_K, FACING_K); g.translate(-cx, -fy);

    softShadow(g, cx, fy - 2, 84, 15, 0.4);

    // Marble bench
    g.fillStyle = lgrad(g, 0, hip + 2, 0, hip + 42, [[0, '#cfbd94'], [1, '#a8946c']]);
    g.fillRect(cx - 64, hip + 2, 128, 40);
    g.fillStyle = '#e6dabd'; g.fillRect(cx - 64, hip - 7, 128, 9);
    g.fillStyle = '#9b8560'; g.fillRect(cx - 64, hip + 2, 128, 3);
    g.fillStyle = '#b39e74'; g.fillRect(cx - 58, hip + 42, 15, fy - hip - 44);
    g.fillStyle = '#a08a5f'; g.fillRect(cx + 43, hip + 42, 15, fy - hip - 44);

    // Staff (Socrates)
    if (s.staff) {
        cap(g, [[cx + 54, hc - 34], [cx + 49, fy - 2]], 5, '#8b5a2b');
        cap(g, [[cx + 53, hc - 30], [cx + 50, fy - 6]], 1.8, '#a5713a');
        ell(g, cx + 54, hc - 37, 4.5, 4, '#6b4423');
    }

    // Shins & sandalled feet
    for (const sx of [-18, 18]) {
        cap(g, [[cx + sx, fy - 44], [cx + sx * 0.9, fy - 10]], 14, sk.b);
        cap(g, [[cx + sx + 4, fy - 40], [cx + sx * 0.9 + 4, fy - 12]], 3.5, sk.s);
        ell(g, cx + sx * 0.95, fy - 6, 13, 5.5, sk.b);
        ell(g, cx + sx * 0.95, fy - 2.5, 15, 3.5, '#7c5a3a');
        cap(g, [[cx + sx * 0.95 - 7, fy - 8], [cx + sx * 0.95 + 7, fy - 8]], 2, '#5d4227');
        cap(g, [[cx + sx, fy - 26], [cx + sx, fy - 22]], 2, '#5d4227');
    }

    // Robe fall from hips to hem, pleated
    const hem = fy - 32;
    g.beginPath();
    g.moveTo(cx - 41, hip - 4);
    g.quadraticCurveTo(cx - 46, (hip + hem) / 2, cx - 45, hem);
    g.lineTo(cx + 45, hem);
    g.quadraticCurveTo(cx + 46, (hip + hem) / 2, cx + 41, hip - 4);
    g.closePath();
    g.fillStyle = lgrad(g, cx - 45, 0, cx + 45, 0, [[0, cl.l], [0.45, cl.b], [1, cl.s]]);
    g.fill();
    for (let k = -3; k <= 3; k++) {
        const fx = cx + k * 12;
        flow(g, [[fx, hip + 2], [fx + (k < 0 ? -2 : 2), (hip + hem) / 2], [fx, hem - 2]],
             3.2, k % 2 ? 'rgba(0,0,0,0.14)' : 'rgba(255,255,250,0.16)');
    }
    if (s.trim) { g.fillStyle = s.trim; g.fillRect(cx - 45, hem - 7, 90, 7); }
    g.fillStyle = 'rgba(0,0,0,0.2)'; g.fillRect(cx - 45, hem - 1, 90, 2.5);

    // Lap: thighs projecting forward
    cap(g, [[cx - 32, ly + 14], [cx - 8, ly + 11]], 27, cl.b);
    cap(g, [[cx + 32, ly + 14], [cx + 8, ly + 11]], 27, cl.b);
    cap(g, [[cx - 32, ly + 9], [cx - 10, ly + 6]], 12, cl.l);
    cap(g, [[cx + 32, ly + 9], [cx + 10, ly + 6]], 12, cl.l);
    flow(g, [[cx, ly + 2], [cx - 1, ly + 14], [cx, ly + 24]], 4.5, 'rgba(0,0,0,0.2)');
    g.fillStyle = 'rgba(0,0,0,0.16)'; g.fillRect(cx - 38, ly + 26, 76, 4);

    // Torso
    g.beginPath();
    g.moveTo(cx - 42, shY + 6);
    g.quadraticCurveTo(cx - 42, (shY + ly) / 2, cx - 33, ly + 4);
    g.lineTo(cx + 33, ly + 4);
    g.quadraticCurveTo(cx + 42, (shY + ly) / 2, cx + 42, shY + 6);
    g.quadraticCurveTo(cx, shY - 8, cx - 42, shY + 6);
    g.closePath();
    g.fillStyle = lgrad(g, cx - 42, 0, cx + 42, 0, [[0, cl.l], [0.45, cl.b], [1, cl.s]]);
    g.fill();
    flow(g, [[cx - 12, shY + 18], [cx - 15, (shY + ly) / 2], [cx - 12, ly]], 2.6, 'rgba(0,0,0,0.13)');
    flow(g, [[cx + 8, shY + 22], [cx + 11, (shY + ly) / 2 + 6], [cx + 9, ly]], 2.6, 'rgba(0,0,0,0.13)');
    flow(g, [[cx - 24, shY + 14], [cx - 27, (shY + ly) / 2], [cx - 24, ly - 4]], 3, 'rgba(255,255,248,0.18)');
    // Chest opening
    g.beginPath(); g.moveTo(cx - 10, shY + 2); g.lineTo(cx + 10, shY + 2); g.lineTo(cx, shY + 18); g.closePath();
    g.fillStyle = sk.b; g.fill();
    g.strokeStyle = 'rgba(0,0,0,0.18)'; g.lineWidth = 2;
    g.beginPath(); g.moveTo(cx - 9, shY + 3); g.lineTo(cx, shY + 17); g.stroke();
    if (s.trim) {
        g.strokeStyle = s.trim; g.lineWidth = 4;
        g.beginPath(); g.moveTo(cx - 13, shY + 1); g.lineTo(cx, shY + 20); g.lineTo(cx + 13, shY + 1); g.stroke();
    }
    g.fillStyle = 'rgba(0,0,0,0.2)'; g.fillRect(cx - 31, ly - 6, 62, 5);   // belt shadow

    // Himation drape (Socrates)
    if (s.drape) {
        const dr = s.drapeR;
        flow(g, [[cx + 32, shY - 2], [cx + 4, shY + 34], [cx - 28, ly + 6]], 32, dr.b);
        flow(g, [[cx + 29, shY - 6], [cx + 1, shY + 28], [cx - 29, ly]], 6, 'rgba(255,255,250,0.28)');
        flow(g, [[cx + 35, shY + 6], [cx + 9, shY + 40], [cx - 25, ly + 14]], 6, 'rgba(0,0,0,0.22)');
        flow(g, [[cx + 32, shY], [cx + 5, shY + 33], [cx - 27, ly + 7]], 2.5, 'rgba(0,0,0,0.14)');
        ell(g, cx + 33, shY + 2, 17, 13, dr.b);
        ell(g, cx + 31, shY - 3, 11, 6, shift(s.drape, 18));
        flow(g, [[cx - 28, ly + 6], [cx - 40, ly + 16], [cx - 44, hip + 18]], 22, dr.b);
        flow(g, [[cx - 30, ly + 8], [cx - 42, ly + 20], [cx - 46, hip + 14]], 5, dr.s);
    }

    // Shoulders
    ell(g, cx - 37, shY + 8, 13, 10, cl.b);
    ell(g, cx + 37, shY + 8, 13, 10, s.drape ? s.drapeR.b : cl.b);

    // Arms & hands
    const armShade = pts => { g.globalAlpha = 0.14; flow(g, pts, 4, '#000'); g.globalAlpha = 1; };
    if (a.gesture === 1) {
        for (const sd of [-1, 1]) {
            cap(g, [[cx + sd * 38, shY + 10], [cx + sd * 52, shY + 36], [cx + sd * 44, shY - 8]], 13, sk.b);
            armShade([[cx + sd * 40, shY + 12], [cx + sd * 52, shY + 34]]);
            ell(g, cx + sd * 44, shY - 15, 8, 10, sk.b);
            for (let f = -1; f <= 1; f++) cap(g, [[cx + sd * 44 + f * 5, shY - 20], [cx + sd * 44 + f * 5, shY - 27]], 4, sk.b);
            cap(g, [[cx + sd * (44 - 8), shY - 12], [cx + sd * (44 - 11), shY - 16]], 4.5, sk.b);
        }
    } else if (a.gesture === 2) {
        cap(g, [[cx - 38, shY + 10], [cx - 48, shY + 44], [cx - 20, ly + 8]], 13, sk.b);
        ell(g, cx - 16, ly + 9, 9, 7, sk.b);
        cap(g, [[cx + 38, shY + 10], [cx + 54, shY + 30], [cx + 50, shY - 4]], 13, sk.b);
        ell(g, cx + 50, shY - 9, 8, 8, sk.b);
        cap(g, [[cx + 53, shY - 13], [cx + 58, shY - 25]], 5, sk.b);
    } else if (s.crossedArms) {
        cap(g, [[cx - 38, shY + 10], [cx - 44, shY + 30]], 13, sk.b);
        cap(g, [[cx + 38, shY + 10], [cx + 44, shY + 32]], 13, sk.b);
        cap(g, [[cx - 42, shY + 32], [cx + 26, shY + 40]], 13, sk.b);
        cap(g, [[cx + 42, shY + 34], [cx - 26, shY + 46]], 13, sk.b);
        ell(g, cx + 28, shY + 40, 8, 6.5, sk.b); ell(g, cx - 28, shY + 46, 8, 6.5, sk.b);
        armShade([[cx - 40, shY + 34], [cx + 24, shY + 42]]);
    } else {
        cap(g, [[cx - 38, shY + 10], [cx - 48, shY + 44], [cx - 20, ly + 8]], 13, sk.b);
        armShade([[cx - 40, shY + 14], [cx - 47, shY + 42]]);
        ell(g, cx - 16, ly + 9, 9, 7, sk.b);
        if (s.staff) {
            cap(g, [[cx + 38, shY + 10], [cx + 50, shY + 40]], 13, sk.b);
            ell(g, cx + 51, shY + 44, 8, 7, sk.b);
        } else {
            cap(g, [[cx + 38, shY + 10], [cx + 48, shY + 44], [cx + 20, ly + 8]], 13, sk.b);
            armShade([[cx + 40, shY + 14], [cx + 47, shY + 42]]);
            ell(g, cx + 16, ly + 9, 9, 7, sk.b);
        }
        g.strokeStyle = 'rgba(0,0,0,0.2)'; g.lineWidth = 1.6;
        for (const hx of [cx - 16, cx + 16]) {
            if (s.staff && hx > cx) continue;
            g.beginPath(); g.moveTo(hx - 4, ly + 7); g.lineTo(hx - 4, ly + 13); g.moveTo(hx, ly + 7); g.lineTo(hx, ly + 14); g.stroke();
        }
    }

    // Neck & head
    g.fillStyle = sk.b; g.fillRect(cx - 7, hc + 16, 14, 14);
    g.fillStyle = sk.s; g.fillRect(cx + 2, hc + 16, 5, 14);
    const hg = g.createRadialGradient(cx + tn - 6, hc - 9, 2, cx + tn, hc, 34);
    hg.addColorStop(0, sk.l); hg.addColorStop(0.55, sk.b); hg.addColorStop(1, sk.s);
    ell(g, cx + tn, hc, 17, 21, hg);

    // Hair
    if (s.bald) {
        g.strokeStyle = 'rgba(255,255,245,0.5)'; g.lineWidth = 3;
        g.beginPath(); g.arc(cx + tn - 2, hc - 6, 12, -2.6, -1.2); g.stroke();
        ell(g, cx + tn - 16, hc + 4, 4, 8, s.beard); ell(g, cx + tn + 16, hc + 4, 4, 8, s.beard);
    } else if (s.hair.style === 'wild') {
        const hcol = s.hair.color;
        g.beginPath(); g.ellipse(cx + tn, hc - 9, 19, 15, 0, Math.PI, 2 * Math.PI); g.fillStyle = hcol; g.fill();
        for (const [t0, t1, t2] of c.tufts) {
            const an = Math.PI + t0 * Math.PI, r = 17 + t2 * 9;
            ell(g, cx + tn + Math.cos(an) * r, hc - 6 + Math.sin(an) * (r * 0.8),
                4 + t2 * 5, 3.5 + t1 * 4, t2 > 0.5 ? hcol : shift(hcol, 24));
        }
        ell(g, cx + tn - 17, hc + 2, 4.5, 10, hcol); ell(g, cx + tn + 17, hc + 2, 4.5, 10, hcol);
    } else {
        const hcol = s.hair.color;
        g.beginPath(); g.ellipse(cx + tn, hc - 8, 18.5, 14, 0, Math.PI, 2 * Math.PI); g.fillStyle = hcol; g.fill();
        g.fillRect(cx + tn - 18.5, hc - 8, 4, 12); g.fillRect(cx + tn + 14.5, hc - 8, 4, 12);
        g.strokeStyle = 'rgba(255,255,255,0.22)'; g.lineWidth = 2.5;
        g.beginPath(); g.arc(cx + tn - 3, hc - 10, 11, -2.7, -1.5); g.stroke();
        for (let ci = 0; ci < 5; ci++) {
            const [t0, t1, t2] = c.tufts[ci];
            const an = Math.PI * (0.15 + 0.7 * t0);
            ell(g, cx + tn + Math.cos(an) * 17, hc - 8 - Math.sin(an) * 12,
                3.5 + t1 * 2.5, 3 + t2 * 2, hcol);
        }
    }

    // Gold laurel wreath (Judge)
    if (s.laurel) {
        for (let li = 0; li < 6; li++) {
            const an = Math.PI * (0.12 + 0.152 * li);
            ell(g, cx + tn + Math.cos(an) * 18.5, hc - 5 - Math.sin(an) * 13,
                3.4, 1.8, s.laurel, Math.PI / 2 - an);
        }
    }

    // Beard (Socrates)
    if (s.beard) {
        g.beginPath();
        g.moveTo(cx + tn - 14, hc - 1);
        g.quadraticCurveTo(cx + tn - 16, hc + 22, cx + tn, hc + 34);
        g.quadraticCurveTo(cx + tn + 16, hc + 22, cx + tn + 14, hc - 1);
        g.quadraticCurveTo(cx + tn, hc + 10, cx + tn - 14, hc - 1);
        g.closePath(); g.fillStyle = s.beard; g.fill();
        g.strokeStyle = 'rgba(120,110,95,0.35)'; g.lineWidth = 1.8;
        for (const dx of [-7, -2, 3, 8])
            { g.beginPath(); g.moveTo(cx + tn + dx, hc + 10); g.quadraticCurveTo(cx + tn + dx * 1.2, hc + 22, cx + tn + dx * 0.6, hc + 30); g.stroke(); }
        ell(g, cx + tn, hc + 11, 6, 3, sk.b);                                 // mouth clearing
        cap(g, [[cx + tn - 6, hc + 9], [cx + tn + 6, hc + 9]], 3.5, s.beard); // moustache
    }

    // Brows / eyes / nose / mouth
    const browC = s.beard ? '#cfc8b8' : (s.hair && s.hair.color) || '#3a2a1e';
    g.strokeStyle = browC; g.lineWidth = 2.6;
    if (s.brow === 'frown') {
        g.beginPath(); g.moveTo(cx + tn - 10, hc - 8); g.lineTo(cx + tn - 3, hc - 5.5); g.stroke();
        g.beginPath(); g.moveTo(cx + tn + 10, hc - 8); g.lineTo(cx + tn + 3, hc - 5.5); g.stroke();
    } else if (s.brow === 'stern') {
        g.beginPath(); g.moveTo(cx + tn - 10, hc - 6.5); g.lineTo(cx + tn - 2, hc - 6.5); g.stroke();
        g.beginPath(); g.moveTo(cx + tn + 10, hc - 6.5); g.lineTo(cx + tn + 2, hc - 6.5); g.stroke();
    } else {
        g.beginPath(); g.arc(cx + tn - 6.5, hc - 5, 4, Math.PI * 1.15, Math.PI * 1.85); g.stroke();
        g.beginPath(); g.arc(cx + tn + 6.5, hc - 5, 4, Math.PI * 1.15, Math.PI * 1.85); g.stroke();
    }
    if (a.blink) {
        g.strokeStyle = sk.s; g.lineWidth = 2;
        g.beginPath(); g.moveTo(cx + tn - 9, hc - 1); g.lineTo(cx + tn - 4, hc - 1); g.stroke();
        g.beginPath(); g.moveTo(cx + tn + 4, hc - 1); g.lineTo(cx + tn + 9, hc - 1); g.stroke();
    } else {
        ell(g, cx + tn - 6.5, hc - 1.5, 3.4, 2.5, '#f7f3ea');
        ell(g, cx + tn + 6.5, hc - 1.5, 3.4, 2.5, '#f7f3ea');
        const pd = tn > 0 ? 1 : 0;
        ell(g, cx + tn - 6 + pd, hc - 1, 1.7, 1.9, '#2b1d12');
        ell(g, cx + tn + 7 + pd, hc - 1, 1.7, 1.9, '#2b1d12');
    }
    g.strokeStyle = sk.s; g.lineWidth = 2.2;
    g.beginPath(); g.moveTo(cx + tn + 1, hc - 2); g.quadraticCurveTo(cx + tn + 3, hc + 3, cx + tn + 1, hc + 6); g.stroke();
    const my = hc + 12;
    if (a.mouthFrame === 0) cap(g, [[cx + tn - 4, my], [cx + tn + 4, my]], 2.4, '#7f4436');
    else if (a.mouthFrame === 1) { ell(g, cx + tn, my + 1, 4.6, 3.6, '#57302a'); ell(g, cx + tn, my + 2, 2.6, 1.8, '#3d1f1b'); }
    else if (a.mouthFrame === 2) ell(g, cx + tn, my, 3, 2.2, '#57302a');
    else if (s.brow === 'frown' && !s.beard) {
        g.strokeStyle = '#7f4436'; g.lineWidth = 2.4;
        g.beginPath(); g.arc(cx + tn, my + 4, 5, Math.PI * 1.2, Math.PI * 1.8); g.stroke();
    } else {
        g.strokeStyle = '#7f4436'; g.lineWidth = 2.4;
        g.beginPath(); g.arc(cx + tn, my - 2.5, 5, Math.PI * 0.2, Math.PI * 0.8); g.stroke();
    }

    g.restore();
}

/* ---------- foreground figures, seen from behind ---------- */
function drawBack(c, now) {
    const g = hictx, p = c.p, s = p.sprite, a = animState(c, now);
    const cx = p.x, side = p.side;
    const hcY = p.headC + a.bob + a.nod;
    const shY = 205 + (s.slouch ? 12 : 0) + a.bob;
    const sk = s.skinR, cl = s.clothR;

    g.save();
    g.translate(cx, SCENE_H); g.scale(BACK_K, BACK_K); g.translate(-cx, -SCENE_H);

    // Torso silhouette
    g.beginPath();
    g.moveTo(cx - 58, shY);
    g.quadraticCurveTo(cx - 122, shY + 34, cx - 132, 330);
    g.lineTo(cx - 132, SCENE_H + 20);
    g.lineTo(cx + 132, SCENE_H + 20);
    g.lineTo(cx + 132, 330);
    g.quadraticCurveTo(cx + 122, shY + 34, cx + 58, shY);
    g.quadraticCurveTo(cx, shY - (s.slouch ? 40 : 30), cx - 58, shY);
    g.closePath();
    g.fillStyle = lgrad(g, cx - 132, 0, cx + 132, 0, [[0, cl.l], [0.45, cl.b], [1, cl.s]]);
    g.fill();

    // Long drapery folds
    for (const [fx0, fy0, fx1] of [[-52, 26, -74], [-24, 12, -30], [4, 16, 8], [34, 24, 52], [66, 42, 92]]) {
        flow(g, [[cx + fx0, shY + fy0], [cx + (fx0 + fx1) / 2, (shY + SCENE_H) / 2], [cx + fx1, SCENE_H + 10]],
             5.5, 'rgba(0,0,0,0.16)');
        flow(g, [[cx + fx0 - 7, shY + fy0 + 6], [cx + (fx0 + fx1) / 2 - 8, (shY + SCENE_H) / 2], [cx + fx1 - 9, SCENE_H + 10]],
             3.5, 'rgba(255,255,248,0.12)');
    }
    // Light across the shoulders
    g.strokeStyle = 'rgba(255,255,248,0.28)'; g.lineWidth = 7;
    g.beginPath(); g.moveTo(cx - 50, shY + 4); g.quadraticCurveTo(cx, shY - (s.slouch ? 30 : 20), cx + 50, shY + 4); g.stroke();

    // Himation band (Synthesizer)
    if (s.wrap) {
        const wr = s.wrapR;
        flow(g, [[cx + side * 45, shY + 2], [cx, shY + 90], [cx - side * 62, 390]], 36, wr.b);
        flow(g, [[cx + side * 40, shY - 2], [cx - side * 6, shY + 82], [cx - side * 68, 382]], 8, wr.l);
        flow(g, [[cx + side * 52, shY + 10], [cx + side * 8, shY + 100], [cx - side * 54, 398]], 7, wr.s);
    }

    // Inner-side forearm resting
    cap(g, [[cx + side * 116, 356], [cx + side * 102, 470]], 27, sk.b);
    cap(g, [[cx + side * 121, 360], [cx + side * 108, 466]], 6, sk.s);
    ell(g, cx + side * 118, 350, 17, 11, cl.s);                                 // sleeve edge

    // Raised gesturing hand while speaking
    if (c.state === 'speaking') {
        const hy = Math.floor(a.t * 2.2) % 2 ? 236 : 250;
        const hx = cx + side * 118;
        ell(g, hx, hy, 13, 16, sk.b);
        for (let f = -1; f <= 1; f++) cap(g, [[hx + f * 7, hy - 12], [hx + f * 8, hy - 24]], 5.5, sk.b);
        cap(g, [[hx - side * 12, hy + 2], [hx - side * 17, hy - 4]], 6, sk.b);
        g.strokeStyle = sk.s; g.lineWidth = 1.8;
        g.beginPath(); g.moveTo(hx - 3, hy - 6); g.lineTo(hx - 3, hy + 6);
        g.moveTo(hx + 3, hy - 6); g.lineTo(hx + 3, hy + 6); g.stroke();
    }

    // Neck & collar
    g.fillStyle = sk.b; g.fillRect(cx - 13, hcY + 26, 26, shY - hcY - 20);
    g.fillStyle = sk.s; g.fillRect(cx + 3, hcY + 26, 10, shY - hcY - 20);
    g.strokeStyle = cl.l; g.lineWidth = 6;
    g.beginPath(); g.moveTo(cx - 28, shY + 2); g.quadraticCurveTo(cx, shY - 8, cx + 28, shY + 2); g.stroke();

    // Head from behind: hair with sheen and strands
    const hg2 = g.createRadialGradient(cx - side * 10, hcY - 14, 4, cx, hcY, 42);
    hg2.addColorStop(0, shift(s.hair, 26)); hg2.addColorStop(0.5, s.hair); hg2.addColorStop(1, shift(s.hair, -24));
    ell(g, cx, hcY, 30, 36, hg2);
    g.strokeStyle = 'rgba(0,0,0,0.22)'; g.lineWidth = 2.2;
    for (const dx of [-18, -9, 0, 9, 18]) {
        g.beginPath(); g.moveTo(cx + dx, hcY - 30);
        g.quadraticCurveTo(cx + dx * 1.25, hcY, cx + dx * 0.8, hcY + 32); g.stroke();
    }
    if (s.messy) for (const [t0, t1, t2] of c.tufts) {
        const an = Math.PI + t0 * Math.PI, r = 28 + t2 * 8;
        ell(g, cx + Math.cos(an) * r * 0.9, hcY - 6 + Math.sin(an) * r,
            5 + t2 * 5, 4 + t1 * 3, t2 > 0.5 ? s.hair : shift(s.hair, 20));
    }
    ell(g, cx - 28, hcY + 8, 5, 9, sk.b); ell(g, cx + 28, hcY + 8, 5, 9, sk.b); // ears
    ell(g, cx - 28, hcY + 10, 2.5, 4, sk.s); ell(g, cx + 28, hcY + 10, 2.5, 4, sk.s);

    // Speaking: head turned toward the circle, face in profile
    if (c.state === 'speaking') {
        g.beginPath();
        g.moveTo(cx + side * 18, hcY - 30);
        g.quadraticCurveTo(cx + side * 34, hcY - 22, cx + side * 33, hcY - 8);   // forehead
        g.lineTo(cx + side * 39, hcY + 1);                                        // nose
        g.lineTo(cx + side * 31, hcY + 6);
        g.quadraticCurveTo(cx + side * 35, hcY + 13, cx + side * 30, hcY + 17);   // lips
        g.quadraticCurveTo(cx + side * 30, hcY + 26, cx + side * 12, hcY + 30);   // chin/jaw
        g.lineTo(cx + side * 12, hcY - 26);
        g.closePath(); g.fillStyle = sk.b; g.fill();
        g.strokeStyle = sk.s; g.lineWidth = 2;
        g.beginPath(); g.moveTo(cx + side * 30, hcY + 20); g.quadraticCurveTo(cx + side * 22, hcY + 26, cx + side * 14, hcY + 27); g.stroke();
        ell(g, cx + side * 24, hcY - 9, 2.2, 1.8, '#2b1d12');                      // eye
        cap(g, [[cx + side * 20, hcY - 14], [cx + side * 28, hcY - 12]], 2.6, s.hair); // brow
        if (a.mouthFrame === 1) ell(g, cx + side * 30, hcY + 11, 3.4, 2.6, '#57302a');
        else cap(g, [[cx + side * 27, hcY + 11], [cx + side * 33, hcY + 10]], 2, '#7f4436');
    }

    g.restore();
}

/* ============================================================
 * Render loop with pixelation pipeline
 * ============================================================ */
const BAYER = [[0, 8, 2, 10], [12, 4, 14, 6], [3, 11, 1, 9], [15, 7, 13, 5]];
const LEVELS = 11, STEP = 255 / (LEVELS - 1);

function render(now) {
    const t = now / 1000;

    // 1) Paint the scene smoothly at full resolution
    const camX = Math.sin(t * 0.13) * 3, camY = Math.cos(t * 0.09) * 2;
    hictx.drawImage(bgHi, -6 + camX, -6 + camY, SCENE_W + 12, SCENE_H + 12);
    const facing = chars.filter(c => c.p.pose === 'facing').sort((a, b) => a.p.fy - b.p.fy);
    for (const c of facing) drawFacing(c, now);
    for (const c of chars) if (c.p.pose === 'back') drawBack(c, now);
    hictx.drawImage(fgHi, -10 + camX * 2, -10 + camY * 2, SCENE_W + 20, SCENE_H + 20);
    const vg = hictx.createRadialGradient(480, 240, 260, 480, 240, 640);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(70,46,20,0.18)');
    hictx.fillStyle = vg; hictx.fillRect(0, 0, SCENE_W, SCENE_H);

    // 2) Downsample to the pixel grid
    loctx.imageSmoothingEnabled = true;
    loctx.drawImage(hi, 0, 0, LO_W, LO_H);

    // 3) Posterize with ordered dithering — the pixel-art "paint"
    const im = loctx.getImageData(0, 0, LO_W, LO_H), d = im.data;
    for (let y = 0; y < LO_H; y++) {
        const brow = BAYER[y & 3];
        for (let x = 0; x < LO_W; x++) {
            const i = (y * LO_W + x) * 4;
            const off = (brow[x & 3] / 16 - 0.5) * STEP * 0.45;
            d[i]     = Math.round(Math.min(255, Math.max(0, d[i] + off)) / STEP) * STEP;
            d[i + 1] = Math.round(Math.min(255, Math.max(0, d[i + 1] + off)) / STEP) * STEP;
            d[i + 2] = Math.round(Math.min(255, Math.max(0, d[i + 2] + off)) / STEP) * STEP;
        }
    }
    loctx.putImageData(im, 0, 0);

    // 4) Upscale with hard pixels
    ctx.drawImage(lo, 0, 0, SCENE_W, SCENE_H);

    requestAnimationFrame(render);
}
requestAnimationFrame(render);


/* ============================================================
 * Speech bubbles (DOM overlay, typing effect)
 * ============================================================ */
const activeBubbles = new Map(); // persona id -> element

function removeBubble(id) {
    const el = activeBubbles.get(id);
    if (!el) return;
    activeBubbles.delete(id);
    el.classList.remove('visible');
    el.classList.add('hiding');
    setTimeout(() => el.remove(), 350);
}

function speak(persona, text) {
    return new Promise(resolve => {
        const c = chars.find(x => x.p === persona);
        for (const other of chars) other.state = other === c ? 'speaking' : 'listening';
        removeBubble(persona.id);

        const el = document.createElement('div');
        el.className = 'bubble';
        el.style.borderColor = persona.color;
        el.style.background = persona.color + 'cc'; // ~80% opacity
        el.style.color = persona.textColor;

        const name = document.createElement('span');
        name.className = 'speaker-name';
        name.textContent = persona.name;
        const body = document.createElement('span');
        const tail = document.createElement('div');
        tail.className = 'tail';
        tail.style.borderTopColor = persona.color;
        el.append(name, body, tail);

        // Clamp so the bubble (max-width 34%, centered on the speaker) stays on screen
        el.style.left = Math.min(82, Math.max(18, persona.bubble.x / SCENE_W * 100)) + '%';
        el.style.top = Math.max(2, persona.bubble.y / SCENE_H * 100) + '%';
        bubbleLayer.appendChild(el);
        activeBubbles.set(persona.id, el);
        requestAnimationFrame(() => el.classList.add('visible'));

        // Typing effect: character by character, slight pause between words
        let i = 0;
        const step = () => {
            if (!activeBubbles.has(persona.id)) { finish(); return; } // was cleared (abort)
            i++;
            body.textContent = text.slice(0, i);
            if (i < text.length) {
                const pause = text[i - 1] === ' ' ? TYPE_SPEED_MS * 2.5 : TYPE_SPEED_MS;
                setTimeout(step, pause);
            } else {
                setTimeout(finish, BUBBLE_LINGER_MS);
            }
        };
        const finish = () => {
            removeBubble(persona.id);
            if (c) c.state = 'idle';
            for (const other of chars) if (other.state === 'listening') other.state = 'idle';
            resolve();
        };
        step();
    });
}

function clearAllBubbles() {
    for (const id of [...activeBubbles.keys()]) removeBubble(id);
}

/* ============================================================
 * Status messages
 * ============================================================ */
let statusTimer = null;
function setStatus(msg, { error = false, sticky = false } = {}) {
    clearTimeout(statusTimer);
    statusEl.textContent = msg;
    statusEl.classList.toggle('error', error);
    statusEl.classList.add('visible');
    if (!sticky) statusTimer = setTimeout(() => statusEl.classList.remove('visible'), 6000);
}

/* ============================================================
 * OpenRouter API
 * ============================================================ */
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function callAgent(persona, userContent, signal) {
    const key = keyInput.value.trim();
    const model = modelInput.value.trim() || DEFAULT_MODEL;
    let lastErr;
    for (let attempt = 0; attempt < 3; attempt++) {
        if (attempt > 0) await sleep(3000 * attempt);
        try {
            const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                method: 'POST',
                signal,
                headers: {
                    'Authorization': 'Bearer ' + key,
                    'Content-Type': 'application/json',
                    'X-Title': 'Socratic Approach'
                },
                body: JSON.stringify({
                    model,
                    max_tokens: 300,
                    messages: [
                        { role: 'system', content: persona.system },
                        { role: 'user', content: userContent }
                    ]
                })
            });
            if (res.status === 429 || res.status >= 500) {
                lastErr = new Error('OpenRouter is rate-limiting (HTTP ' + res.status + ')');
                continue; // retry with backoff
            }
            if (!res.ok) {
                const detail = await res.json().catch(() => null);
                throw new Error((detail && detail.error && detail.error.message) ||
                                'OpenRouter error (HTTP ' + res.status + ')');
            }
            const data = await res.json();
            const text = data.choices && data.choices[0] &&
                         data.choices[0].message && data.choices[0].message.content;
            if (!text || !text.trim()) { lastErr = new Error('Empty response from model'); continue; }
            return text.trim();
        } catch (e) {
            if (e.name === 'AbortError') throw e;
            lastErr = e;
        }
    }
    throw lastErr || new Error('OpenRouter request failed');
}

/* ============================================================
 * Debate orchestration
 * ============================================================ */
function buildPrompt(topic, transcript, extra) {
    let out = 'The topic under debate: "' + topic + '"\n\n';
    if (transcript.length) {
        out += 'Transcript so far:\n';
        for (const turn of transcript) out += turn.speaker + ': ' + turn.text + '\n';
        out += '\n';
    }
    out += extra || 'It is now your turn to speak.';
    return out;
}

const VERDICT_RE = /\bVERDICT:\s*(CONSENSUS|CONTINUE)\b/i;
const SPEAKING_ORDER = ['socrates', 'contrarian', 'freethinker', 'grump', 'synthesizer'];

let controller = null;

async function runDebate(topic) {
    const transcript = [];
    const debaters = SPEAKING_ORDER.map(id => PERSONAS.find(p => p.id === id));
    const judge = PERSONAS.find(p => p.id === 'judge');
    const signal = controller.signal;
    let consensus = false;

    for (let round = 1; round <= MAX_TURNS && !consensus; round++) {
        for (const p of debaters) {
            if (signal.aborted) return;
            setStatus(p.name + ' is thinking… (round ' + round + '/' + MAX_TURNS + ')', { sticky: true });
            const text = await callAgent(p, buildPrompt(topic, transcript), signal);
            if (signal.aborted) return;
            transcript.push({ speaker: p.name, text });
            await speak(p, text);
            await sleep(API_DELAY_MS);
        }

        if (signal.aborted) return;
        setStatus('The Judge is deliberating…', { sticky: true });
        const evalPrompt = buildPrompt(topic, transcript,
            'It is now your turn to speak. Briefly assess the round, then end your reply with a ' +
            'final line reading exactly "VERDICT: CONSENSUS" if the group has substantially ' +
            'converged, or "VERDICT: CONTINUE" if the debate should go on.');
        const raw = await callAgent(judge, evalPrompt, signal);
        if (signal.aborted) return;
        const m = raw.match(VERDICT_RE);
        consensus = !!(m && m[1].toUpperCase() === 'CONSENSUS');
        const clean = raw.replace(VERDICT_RE, '').replace(/\n{2,}/g, '\n').trim();
        transcript.push({ speaker: judge.name, text: clean });
        await speak(judge, clean);
        await sleep(API_DELAY_MS);
    }

    if (signal.aborted) return;
    setStatus('The Judge prepares the final verdict…', { sticky: true });
    const summary = await callAgent(judge, buildPrompt(topic, transcript,
        'The debate has ended. Deliver the final verdict: name the strongest arguments heard and ' +
        'state the group\'s consensus position on the topic in at most five sentences.'), signal);
    if (signal.aborted) return;
    await speak(judge, summary);
    setStatus(consensus ? 'Consensus reached. The agora falls quiet.'
                        : 'No full consensus — the Judge has ruled.');
}

/* ============================================================
 * UI wiring
 * ============================================================ */
const topicInput = document.getElementById('topic-input');
const keyInput = document.getElementById('key-input');
const modelInput = document.getElementById('model-input');
const startBtn = document.getElementById('start-btn');
const stopBtn = document.getElementById('stop-btn');

modelInput.value = localStorage.getItem('sa_model') || DEFAULT_MODEL;
keyInput.value = localStorage.getItem('sa_or_key') || '';

function setRunning(running) {
    startBtn.disabled = running;
    topicInput.disabled = running;
    stopBtn.style.display = running ? 'inline-block' : 'none';
}

startBtn.addEventListener('click', async () => {
    const topic = topicInput.value.trim();
    if (!topic) { setStatus('Offer the assembly a question first.', { error: true }); topicInput.focus(); return; }
    if (!keyInput.value.trim()) { setStatus('An OpenRouter API key is required.', { error: true }); keyInput.focus(); return; }

    localStorage.setItem('sa_or_key', keyInput.value.trim());
    localStorage.setItem('sa_model', modelInput.value.trim() || DEFAULT_MODEL);

    controller = new AbortController();
    setRunning(true);
    setStatus('The philosophers gather…', { sticky: true });
    try {
        await runDebate(topic);
    } catch (e) {
        if (e.name !== 'AbortError') setStatus(e.message || 'The debate faltered.', { error: true });
    } finally {
        controller = null;
        clearAllBubbles();
        for (const c of chars) c.state = 'idle';
        setRunning(false);
    }
});

stopBtn.addEventListener('click', () => {
    if (controller) controller.abort();
    clearAllBubbles();
    setStatus('The debate was adjourned.');
});

topicInput.addEventListener('keydown', e => { if (e.key === 'Enter') startBtn.click(); });

setStatus('Welcome to the agora. Pose a question to begin.');
</script>
