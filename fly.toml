app = "socratic-backend"
primary_region = "ord"

[build]
  command = "npm install"

[deploy]
  strategy = "rolling"

[[services]]
  internal_port = 3000
  protocol = "tcp"
  
  [[services.http_checks]]
    interval = 10000
    grace_period = "5s"
    method = "get"
    path = "/api/health"
    protocol = "http"
    timeout = 2000
  
  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
