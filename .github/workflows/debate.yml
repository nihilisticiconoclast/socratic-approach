name: Debate

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      question:
        description: Question or statement for the philosophers to debate
        required: true
        type: string

permissions:
  contents: write
  issues: write

concurrency:
  group: debate
  cancel-in-progress: false

jobs:
  debate:
    # Issues only count when they carry the "debate" label (set by the issue template)
    if: github.event_name == 'workflow_dispatch' || contains(github.event.issue.labels.*.name, 'debate')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Postgres client
        run: npm install --no-save pg

      - name: Run the debate
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || secrets.NEON_DATABASE_URL }}
          QUESTION: ${{ github.event.inputs.question || github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/debate.js

      - name: Publish the Chronicle
        run: |
          git config user.name "socratic-approach[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add debates.json
          if git diff --cached --quiet; then
            echo "Chronicle unchanged"
          else
            git commit -m "Chronicle: record new debate"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
