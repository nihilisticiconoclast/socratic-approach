name: Ask the philosophers
description: Submit a question or statement for the six philosophers to debate
title: "Is virtue teachable?"
labels: [debate]
body:
  - type: markdown
    attributes:
      value: |
        **Replace the title above with your question or statement — the title IS the question.**

        The debate runs automatically in GitHub Actions. The verdict will be posted here
        as a comment within a few minutes, and the debate will appear in the site's Chronicle.
  - type: checkboxes
    id: confirm
    attributes:
      label: Ready
      options:
        - label: I have put my question in the title
          required: true
